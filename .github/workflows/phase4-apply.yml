name: Phase 4 Dashboard Rules Diagnostic

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - .phase4-transfer/trigger

permissions:
  contents: write

jobs:
  diagnostic:
    name: Test minimal Dashboard admin Rules path
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/phase-4-completion
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm install --global npm@10.9.2 --no-audit --no-fund
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Reconstruct source and add minimal Dashboard Rules path
        shell: bash
        run: |
          cat .phase4-transfer/chunk-00 .phase4-transfer/rest-00 .phase4-transfer/rest-01-* .phase4-transfer/rest-02 .phase4-transfer/rest-03-00 .phase4-transfer/rest-03-01 .phase4-transfer/rest-03-02-* > /tmp/phase4.b64
          base64 --decode /tmp/phase4.b64 > /tmp/phase4.tar.gz
          echo '53add98bcf8090ea181e57838dacf5d0096e2ec27dfeaad6c4abdbf2330e11cd  /tmp/phase4.tar.gz' | sha256sum --check --strict
          tar -xzf /tmp/phase4.tar.gz -C .
          python - <<'PY'
          from pathlib import Path

          path = Path('firestore.rules')
          source = path.read_text(encoding='utf-8')
          marker = """    function hasPerm(permission) {
          """
          helper = """    // Minimal, fail-closed path for server aggregation queries. The app's
              // canonical administrator source is the wildcard in permissions_flat.
              function dashboardAggregateAdmin() {
                let path = userPath();
                let user = get(path).data;
                return signedIn()
                  && exists(path)
                  && activeUserData(user)
                  && user.get('permissions_flat', []) is list
                  && '*' in user.get('permissions_flat', []);
              }

          """.replace('\n              ', '\n    ').replace('\n                ', '\n      ').replace('\n                  ', '\n        ')
          if marker not in source:
              raise SystemExit('hasPerm marker not found')
          source = source.replace(marker, helper + marker, 1)

          replacements = {
            "      allow read: if isAdmin()\n        || (\n          hasPerm('customers.view')":
              "      allow read: if dashboardAggregateAdmin()\n        || isAdmin()\n        || (\n          hasPerm('customers.view')",
            "      allow read: if hasAnyPerm(['products.view', 'inventory.view', 'printing.view']);":
              "      allow read: if dashboardAggregateAdmin()\n        || hasAnyPerm(['products.view', 'inventory.view', 'printing.view']);",
            "      allow read: if hasPerm('orders.view_all')":
              "      allow read: if dashboardAggregateAdmin()\n        || hasPerm('orders.view_all')",
            "      allow read: if hasPerm('payments.view_all')":
              "      allow read: if dashboardAggregateAdmin()\n        || hasPerm('payments.view_all')",
            "      allow read: if hasAnyPerm([\n          'page.warehouse_export_requests',":
              "      allow read: if dashboardAggregateAdmin()\n        || hasAnyPerm([\n          'page.warehouse_export_requests',",
          }
          for old, new in replacements.items():
              if old not in source:
                  raise SystemExit(f'Rules block not found: {old[:60]}')
              source = source.replace(old, new, 1)

          # The orders.view_all pattern occurs first in /orders and then /order_items.
          order_items_old = """    match /order_items/{docId} {
              allow read: if hasPerm('orders.view_all')
          """.replace('\n              ', '\n      ')
          order_items_new = """    match /order_items/{docId} {
              allow read: if dashboardAggregateAdmin()
                || hasPerm('orders.view_all')
          """.replace('\n              ', '\n      ').replace('\n                ', '\n        ')
          if order_items_old not in source:
              raise SystemExit('order_items read block not found')
          source = source.replace(order_items_old, order_items_new, 1)
          path.write_text(source, encoding='utf-8')
          PY
          git diff --check

      - run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run Dashboard aggregate test
        id: dashboard
        shell: bash
        run: |
          set +e
          npx firebase emulators:exec --only firestore "node --test --test-concurrency=1 tests/dashboard-aggregation.rules.test.mjs" 2>&1 | tee .phase4-transfer/minimal-dashboard-admin.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit diagnostic log
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f .phase4-transfer/minimal-dashboard-admin.log
          git commit -m 'test(phase4): capture minimal Dashboard admin result'
          git push origin HEAD:fix/phase-4-completion

      - name: Report failure
        if: steps.dashboard.outputs.exit_code != '0'
        run: exit 1
