name: Agent PR trigger

on:
  pull_request:
    branches:
      - dev
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/unify-view-all-actions' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unify-view-all-actions
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Apply guarded permission patch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          python3 scripts/agent_permission_patch.py > /tmp/patch.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            { echo 'Permission patch failed:'; echo '```text'; cat /tmp/patch.log; echo '```'; } > /tmp/comment.md
            gh pr comment 70 --body-file /tmp/comment.md
            exit "$status"
          fi
      - run: npm ci
      - run: node --test tests/permission-matrix.client.test.mjs tests/view-all-action-scopes.client.test.mjs
      - run: npm run test:rules
      - name: Commit final changes
        run: |
          rm .github/workflows/agent-unify-view-all.yml .github/workflows/agent-pr-trigger.yml scripts/agent_permission_patch.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "unify view all action scopes"
          git push origin HEAD:agent/unify-view-all-actions
