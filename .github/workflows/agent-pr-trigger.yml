name: Agent PR trigger

on:
  pull_request:
    branches:
      - dev
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/unify-view-all-actions' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unify-view-all-actions
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Extract and run patch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sed -n '30,324p' .github/workflows/agent-unify-view-all.yml | sed 's/^          //' > /tmp/patch.py
          python3 - <<'PREPARE'
          from pathlib import Path
          path = Path('/tmp/patch.py')
          text = path.read_text()
          start = text.index('old = """    function canMutateOrderById')
          end = text.index('replacements = [', start)
          replacement = '''needle = "          isAdmin()\\n          || ownsOrderData(order)"
          if text.count(needle) != 2:
              raise SystemExit(f'firestore.rules: expected two order mutation ownership checks, found {text.count(needle)}')
          text = text.replace(
              needle,
              "          isAdmin()\\n          || hasPerm('orders.view_all')\\n          || ownsOrderData(order)",
              2,
          )

          '''
          path.write_text(text[:start] + replacement + text[end:])
          PREPARE
          set +e
          python3 /tmp/patch.py > /tmp/patch.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo 'Permission patch failed:'
              echo '```text'
              cat /tmp/patch.log
              echo '```'
            } > /tmp/comment.md
            gh pr comment 70 --body-file /tmp/comment.md
            exit "$status"
          fi
      - run: npm ci
      - run: node --test tests/permission-matrix.client.test.mjs tests/view-all-action-scopes.client.test.mjs
      - run: npm run test:rules
      - name: Commit final changes
        run: |
          rm .github/workflows/agent-unify-view-all.yml .github/workflows/agent-pr-trigger.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "unify view all action scopes"
          git push origin HEAD:agent/unify-view-all-actions
