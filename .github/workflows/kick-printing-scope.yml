name: Trigger printing scope patch

# Temporary self-removing rules patch.
on:
  pull_request:
    branches:
      - dev
    types:
      - synchronize

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Enforce printing ownership in Firestore Rules
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path('firestore.rules')
          text = path.read_text(encoding='utf-8')
          start = text.index('    match /print_orders/{docId} {')
          end = text.index('    match /shipments/{docId} {', start)
          replacement = '''    match /print_orders/{docId} {
      allow read: if hasPerm('printing.view_all')
        || (
          hasPerm('printing.view')
          && ownsPrintOrderData(resource.data)
        );

      allow create: if hasPerm('printing.create')
        && request.resource.data.get('order_code', '') is string
        && request.resource.data.get('order_code', '') != ''
        && printOrderSourceMatches(request.resource.data)
        && ownEmailField(request.resource.data, 'created_by');

      allow update: if isAdmin()
        || (
          hasPerm('printing.edit')
          && ownsPrintOrderData(resource.data)
          && warehouseDocIdentitySafe()
          && request.resource.data.get('order_code', '') is string
          && request.resource.data.get('order_code', '') != ''
          && printOrderSourceMatches(request.resource.data)
          && unchanged(['deleted', 'active', 'status', 'deleted_at', 'deleted_by'])
        )
        || (
          hasPerm('printing.delete')
          && ownsPrintOrderData(resource.data)
          && warehouseDocIdentitySafe()
          && warehouseSoftDeleteOnly()
        );

      allow delete: if isAdmin();
    }

    match /print_order_items/{docId} {
      allow read: if hasPerm('printing.view_all')
        || (
          hasPerm('printing.view')
          && ownEmailField(resource.data, 'created_by')
        );

      allow create: if hasAnyPerm(['printing.create', 'printing.edit'])
        && request.resource.data.print_order_id is string
        && ownsActivePrintOrderAfterById(request.resource.data.print_order_id)
        && request.resource.data.get('product_id', '') is string
        && request.resource.data.get('product_id', '') != ''
        && printQuantitiesAreValid(request.resource.data)
        && ownEmailField(request.resource.data, 'created_by');

      allow update: if isAdmin()
        || (
          hasPerm('printing.edit')
          && ownEmailField(resource.data, 'created_by')
          && ownsActivePrintOrderAfterById(resource.data.print_order_id)
          && unchanged(['id', 'print_order_id', 'created_at', 'created_by', 'source'])
          && printQuantitiesAreValid(request.resource.data)
        )
        || (
          hasAnyPerm(['printing.edit', 'printing.delete'])
          && ownEmailField(resource.data, 'created_by')
          && ownsPrintOrderAfterById(resource.data.print_order_id)
          && unchanged(['id', 'print_order_id', 'created_at', 'created_by', 'source'])
          && warehouseSoftDeleteOnly()
        );

      allow delete: if isAdmin();
    }

'''
          path.write_text(text[:start] + replacement + text[end:], encoding='utf-8')
          PY

      - name: Remove temporary workflows and push
        shell: bash
        run: |
          rm -f .github/workflows/fix-printing-rules-once.yml
          rm -f .github/workflows/kick-printing-scope.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(rules): enforce printing record ownership"
          git push origin HEAD:${{ github.head_ref }}
