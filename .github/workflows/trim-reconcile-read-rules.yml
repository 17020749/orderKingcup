name: Trim Reconcile Read Rules

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  trim:
    if: github.head_ref == 'fix/runtime-export-and-sync-locks'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/runtime-export-and-sync-locks
          fetch-depth: 0
          show-progress: false
      - name: Check state
        id: state
        run: |
          if grep -A2 "match /orders/{docId}" firestore.rules | grep -q "allow read: if isAdmin"; then
            echo "applied=false" >> "$GITHUB_OUTPUT"
          else
            echo "applied=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Apply trim
        if: steps.state.outputs.applied == 'false'
        run: python3 scripts/trim-reconcile-read-rules.py
      - name: Commit rules
        if: steps.state.outputs.applied == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add firestore.rules
          git commit -m "fix(rules): remove redundant admin read branches"
          git push origin HEAD:fix/runtime-export-and-sync-locks
