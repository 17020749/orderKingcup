name: Phase 2 timezone bootstrap

on:
  push:
    branches:
      - fix/phase-2-business-timezone
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/phase-2-business-timezone

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Pin npm
        run: npm install --global npm@10.9.2 --no-audit --no-fund

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Apply Vietnam business timezone changes
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')

          const write = (file, content) => {
            fs.mkdirSync(path.dirname(file), { recursive: true })
            fs.writeFileSync(file, content.replace(/\r\n/g, '\n'))
          }

          write('lib/businessDate.mjs', `export const BUSINESS_TIME_ZONE = 'Asia/Ho_Chi_Minh'

          const businessDateFormatter = new Intl.DateTimeFormat('en-CA', {
            timeZone: BUSINESS_TIME_ZONE,
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
          })

          function toValidDate(value) {
            if (value?.toDate && typeof value.toDate === 'function') {
              const date = value.toDate()
              return date instanceof Date && !Number.isNaN(date.getTime()) ? date : null
            }
            if (typeof value?.seconds === 'number') {
              const date = new Date(value.seconds * 1000)
              return Number.isNaN(date.getTime()) ? null : date
            }
            const date = value instanceof Date ? value : new Date(value)
            return Number.isNaN(date.getTime()) ? null : date
          }

          export function businessDateKey(value = new Date()) {
            const raw = typeof value === 'string' ? value.trim() : ''
            if (/^\\d{4}-\\d{2}-\\d{2}$/.test(raw)) return raw

            const date = toValidDate(value)
            if (!date) return ''

            const parts = Object.fromEntries(
              businessDateFormatter
                .formatToParts(date)
                .filter(part => part.type !== 'literal')
                .map(part => [part.type, part.value]),
            )
            return \`\${parts.year}-\${parts.month}-\${parts.day}\`
          }

          export function todayKey(value = new Date()) {
            return businessDateKey(value) || businessDateKey(new Date())
          }

          export function monthKey(dateValue = new Date()) {
            const raw = typeof dateValue === 'string' ? dateValue.trim() : ''
            if (/^\\d{4}-\\d{2}$/.test(raw)) return raw
            if (/^\\d{4}-\\d{2}-\\d{2}$/.test(raw)) return raw.slice(0, 7)

            const key = businessDateKey(dateValue)
            return (key || todayKey()).slice(0, 7)
          }

          export function toDateKey(value) {
            if (!value) return ''
            return businessDateKey(value)
          }

          export function isDateInRange(value, from, to) {
            const key = toDateKey(value)
            if (from && (!key || key < from)) return false
            if (to && (!key || key > to)) return false
            return true
          }
          `)

          const formatPath = 'utils/format.ts'
          let format = fs.readFileSync(formatPath, 'utf8')
          if (!format.includes("from '../lib/businessDate.mjs'")) {
            format = format.replace(
              `export function todayKey() {
            return new Date().toISOString().slice(0, 10)
          }
          `,
              `// @ts-ignore Shared ESM helpers are executed directly by Node tests.
          import { BUSINESS_TIME_ZONE, businessDateKey, monthKey, todayKey } from '../lib/businessDate.mjs'

          export { BUSINESS_TIME_ZONE, businessDateKey, monthKey, todayKey }
          `,
            )
            format = format.replace(
              `export function monthKey(dateValue?: any) {
            const raw = String(dateValue || todayKey())
            if (/^\\d{4}-\\d{2}/.test(raw)) return raw.slice(0, 7)
            const d = new Date(raw)
            if (Number.isNaN(d.getTime())) return todayKey().slice(0, 7)
            return d.toISOString().slice(0, 7)
          }

          `,
              '',
            )
          }
          write(formatPath, format)

          const filtersPath = 'utils/listFilters.ts'
          let filters = fs.readFileSync(filtersPath, 'utf8')
          if (!filters.includes("from '../lib/businessDate.mjs'")) {
            filters = filters.replace(
              "import { normalizeText } from './format.ts'",
              "import { normalizeText } from './format.ts'\n// @ts-ignore Shared ESM helpers are executed directly by Node tests.\nimport { isDateInRange, toDateKey } from '../lib/businessDate.mjs'",
            )
            filters = filters.replace(
              /export function toDateKey[\s\S]*?export function matchesKeyword/,
              'export { isDateInRange, toDateKey }\n\nexport function matchesKeyword',
            )
          }
          write(filtersPath, filters)

          for (const file of ['pages/orders.vue', 'pages/payments.vue', 'pages/invoices.vue', 'pages/shipments.vue']) {
            let source = fs.readFileSync(file, 'utf8')
            if (!source.includes("from '~/utils/listFilters'")) {
              source = source.replace(
                "import { reportFirebaseError } from '~/utils/firebaseErrors'",
                "import { reportFirebaseError } from '~/utils/firebaseErrors'\nimport { toDateKey } from '~/utils/listFilters'",
              )
            }
            source = source.replace(
              /function dateKey\(value: any\) \{\n  return String\(value \|\| ''\)\.slice\(0, 10\)\n\}\n\n/,
              '',
            )
            source = source.replace('const rowDate = dateKey(', 'const rowDate = toDateKey(')
            write(file, source)
          }

          write('tests/business-date.test.mjs', `import test from 'node:test'
          import assert from 'node:assert/strict'
          import { BUSINESS_TIME_ZONE, businessDateKey, isDateInRange, monthKey, toDateKey, todayKey } from '../lib/businessDate.mjs'

          const instant = value => new Date(value)

          test('business date helpers use Asia/Ho_Chi_Minh', () => {
            assert.equal(BUSINESS_TIME_ZONE, 'Asia/Ho_Chi_Minh')
          })

          test('todayKey keeps the Vietnam business date before the UTC boundary', () => {
            assert.equal(todayKey(instant('2026-07-19T17:30:00.000Z')), '2026-07-20')
            assert.equal(todayKey(instant('2026-07-19T23:59:00.000Z')), '2026-07-20')
            assert.equal(todayKey(instant('2026-07-20T00:00:00.000Z')), '2026-07-20')
          })

          test('business date helpers handle month and year boundaries', () => {
            const firstOfMonthInVietnam = instant('2026-07-31T17:30:00.000Z')
            const firstOfYearInVietnam = instant('2026-12-31T17:30:00.000Z')

            assert.equal(businessDateKey(firstOfMonthInVietnam), '2026-08-01')
            assert.equal(monthKey(firstOfMonthInVietnam), '2026-08')
            assert.equal(businessDateKey(firstOfYearInVietnam), '2027-01-01')
            assert.equal(monthKey(firstOfYearInVietnam), '2027-01')
          })

          test('business date helpers handle leap day', () => {
            const leapDayInVietnam = instant('2024-02-28T17:30:00.000Z')
            const marchInVietnam = instant('2024-02-29T17:30:00.000Z')

            assert.equal(todayKey(leapDayInVietnam), '2024-02-29')
            assert.equal(monthKey(leapDayInVietnam), '2024-02')
            assert.equal(todayKey(marchInVietnam), '2024-03-01')
            assert.equal(monthKey(marchInVietnam), '2024-03')
          })

          test('date-only business keys are preserved without timezone conversion', () => {
            assert.equal(businessDateKey('2026-07-20'), '2026-07-20')
            assert.equal(monthKey('2026-07'), '2026-07')
            assert.equal(monthKey('2026-07-20'), '2026-07')
          })

          test('date range filters use the Vietnam business date', () => {
            const beforeUtcBoundary = '2026-07-19T17:30:00.000Z'

            assert.equal(toDateKey(beforeUtcBoundary), '2026-07-20')
            assert.equal(isDateInRange(beforeUtcBoundary, '2026-07-20', '2026-07-20'), true)
            assert.equal(isDateInRange(beforeUtcBoundary, undefined, '2026-07-19'), false)
          })
          `)

          const packagePath = 'package.json'
          const packageJson = JSON.parse(fs.readFileSync(packagePath, 'utf8'))
          if (!packageJson.scripts['test:rules'].includes('tests/business-date.test.mjs')) {
            packageJson.scripts['test:rules'] = packageJson.scripts['test:rules'].replace(
              'tests/order-code.test.mjs ',
              'tests/order-code.test.mjs tests/business-date.test.mjs ',
            )
          }
          write(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`)

          const excluded = new Set(['node_modules', '.nuxt', '.output', 'dist', 'backups', '.git'])
          const offenders = []
          const walk = dir => {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              if (excluded.has(entry.name)) continue
              const target = path.join(dir, entry.name)
              if (entry.isDirectory()) walk(target)
              else if (/\.(?:ts|js|mjs|vue)$/.test(entry.name)) {
                const source = fs.readFileSync(target, 'utf8')
                if (/toISOString\(\)\.slice\(0,\s*(?:7|10)\)/.test(source)) offenders.push(target)
              }
            }
          }
          walk('.')
          if (offenders.length) throw new Error(`UTC business-date slicing remains in: ${offenders.join(', ')}`)
          NODE

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Verify timezone tests
        run: node --test --test-concurrency=1 tests/business-date.test.mjs

      - name: Prepare Nuxt
        run: npx --no-install nuxi prepare

      - name: Build
        run: npm run build

      - name: Generate
        run: npm run generate

      - name: Firestore Rules and concurrency tests
        run: npm run test:rules

      - name: Review diff
        run: |
          git diff --check
          git status --short
          git diff --stat

      - name: Commit timezone changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'No source changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib/businessDate.mjs utils/format.ts utils/listFilters.ts pages/orders.vue pages/payments.vue pages/invoices.vue pages/shipments.vue tests/business-date.test.mjs package.json
          git commit -m 'fix(timezone): use Vietnam business dates'
          git push origin HEAD:fix/phase-2-business-timezone
