name: Apply V7.5 transaction hardening

on:
  pull_request:
    branches:
      - feature/v7.4-stability-fixes
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-v7-5:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'feature/v7.5-transaction-hardening' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout V7.5 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Apply guarded V7.5 patch
        id: patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-v7.5-transaction-hardening.py')
          text = path.read_text(encoding='utf-8')

          old_target = '''    "  createdBy: string\\n}) {",
              "  createdBy: string\\n  operationId: string\\n}) {",
              'movementPayload input'
          '''
          new_target = '''    "  reason: string\\n  createdBy: string\\n}) {",
              "  reason: string\\n  createdBy: string\\n  operationId: string\\n}) {",
              'movementPayload input'
          '''
          if old_target not in text:
              raise SystemExit('Không tìm thấy đoạn patch movementPayload cần thu hẹp.')
          text = text.replace(old_target, new_target, 1)

          old_pattern = '''        r"(movementPayload\\(\\{[\\s\\S]*?\\n(?P<indent>\\s*)createdBy(?:\\s*:\\s*[A-Za-z_][A-Za-z0-9_]*)?)(\\n(?P=indent)\\}\\)\\))"
          '''
          new_pattern = '''        r"(movementPayload\\(\\{[\\s\\S]*?\\n(?P<indent>\\s*)createdBy(?:\\s*:\\s*[A-Za-z_][A-Za-z0-9_]*)?)(\\n\\s*\\}\\)\\))"
          '''
          if old_pattern not in text:
              raise SystemExit('Không tìm thấy regex movementPayload cần nới thụt dòng.')
          text = text.replace(old_pattern, new_pattern, 1)

          def find_label_block(source, label):
              marker = repr(label)
              label_pos = source.find(marker)
              if label_pos < 0:
                  raise SystemExit(f'Không tìm thấy nhãn {label}.')
              block_start = source.rfind('    seg = rep(', 0, label_pos)
              if block_start < 0:
                  block_start = source.rfind('    seg = rep_last(', 0, label_pos)
              block_end = source.find('    )', label_pos)
              if block_start < 0 or block_end < 0:
                  raise SystemExit(f'Không xác định được khối {label}.')
              return block_start, block_end + len('    )')

          def shift_label_block(source, label, shifts):
              block_start, block_end = find_label_block(source, label)
              block = source[block_start:block_end]
              for old_size, new_size in shifts:
                  old_spaces = ' ' * old_size
                  if old_spaces not in block:
                      raise SystemExit(f'Khối {label} thiếu khoảng thụt {old_size} ký tự.')
                  block = block.replace(old_spaces, ' ' * new_size)
              return source[:block_start] + block + source[block_end:]

          text = shift_label_block(text, 'release item fields', [(13, 12)])
          text = shift_label_block(text, 'release request revision', [(11, 10)])
          text = shift_label_block(text, 'release activity anchor', [(9, 8)])
          text = shift_label_block(text, 'release activity operation', [(11, 10), (9, 8)])
          text = shift_label_block(text, 'release return result', [(7, 6)])

          return_start, return_end = find_label_block(text, 'release return result')
          return_block = text[return_start:return_end]
          if 'seg = rep(' not in return_block:
              raise SystemExit('Khối release return result không dùng rep như dự kiến.')
          return_block = return_block.replace('seg = rep(', 'seg = rep_last(', 1)
          text = text[:return_start] + return_block + text[return_end:]

          path.write_text(text, encoding='utf-8')
          PY
          set +e
          python scripts/apply-v7.5-transaction-hardening.py > /tmp/v7.5-patch.log 2>&1
          code=$?
          cat /tmp/v7.5-patch.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record patch diagnostic
        if: steps.patch.outputs.exit_code != '0'
        shell: bash
        run: |
          git reset --hard HEAD
          cp /tmp/v7.5-patch.log v7.5-patch-error.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f v7.5-patch-error.log
          git commit -m "chore: record v7.5 patch failure"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          exit 1

      - name: Static validation
        if: steps.patch.outputs.exit_code == '0'
        shell: bash
        run: |
          node --check tests/firestore.rules.test.mjs
          git diff --check
          grep -q "match /warehouse_operations" firestore.rules
          grep -q "assertExpectedRevision" composables/useWarehouseTransactions.ts
          grep -q "operation_id: form.operation_id" pages/imports.vue
          grep -q "operation_id: form.operation_id" pages/exports.vue
          grep -q "operation_id: form.operation_id" pages/inventory-adjustments.vue

      - name: Commit V7.5 source changes
        if: steps.patch.outputs.exit_code == '0'
        shell: bash
        run: |
          rm -f scripts/apply-v7.5-transaction-hardening.py .github/workflows/apply-v7.5-transaction-hardening.yml v7.5-patch-error.log
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: harden warehouse transactions with idempotency"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
