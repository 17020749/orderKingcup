name: Trigger V7.4 patch from pull request

on:
  pull_request:
    branches:
      - feature/v7.3-print-and-warehouse-search
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout V7.4 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java for Firestore emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Extract and apply guarded patch
        id: patch
        shell: bash
        run: |
          set +e
          {
            python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/apply-v7.4.yml').read_text(encoding='utf-8')
          start = "          python - <<'PY'\n"
          end = "\n          PY\n"
          if start not in source or end not in source:
              raise SystemExit('Không tìm thấy khối patch V7.4 trong workflow nguồn.')
          block = source.split(start, 1)[1].split(end, 1)[0]
          lines = [line[10:] if line.startswith('          ') else line for line in block.splitlines()]
          script = '\n'.join(lines) + '\n'
          old_helper = """from pathlib import Path

          def replace_once(path, old, new):
              file_path = Path(path)
              text = file_path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}\\n--- expected ---\\n{old}')
              file_path.write_text(text.replace(old, new, 1), encoding='utf-8')
          """
          new_helper = """from pathlib import Path
          import re

          def replace_once(path, old, new):
              file_path = Path(path)
              text = file_path.read_text(encoding='utf-8')
              count = text.count(old)
              if count == 1:
                  file_path.write_text(text.replace(old, new, 1), encoding='utf-8')
                  return
              if count == 0:
                  parts = [re.escape(part) for part in re.split(r'\\s+', old.strip()) if part]
                  pattern = r'\\s+'.join(parts)
                  matches = list(re.finditer(pattern, text, flags=re.MULTILINE))
                  if len(matches) == 1:
                      match = matches[0]
                      file_path.write_text(text[:match.start()] + new + text[match.end():], encoding='utf-8')
                      return
              raise SystemExit(f'{path}: expected one match, found {count}\\n--- expected ---\\n{old}')
          """
          if old_helper not in script:
              raise SystemExit('Không tìm thấy helper replace_once trong patch nguồn.')
          Path('/tmp/apply-v7.4.py').write_text(script.replace(old_helper, new_helper, 1), encoding='utf-8')
          PY
            python /tmp/apply-v7.4.py
          } > /tmp/v7.4-check.log 2>&1
          code=$?
          cat /tmp/v7.4-check.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Install dependencies
        id: install
        if: steps.patch.outputs.exit_code == '0'
        shell: bash
        run: |
          set +e
          timeout 600 npm ci --ignore-scripts --no-audit --no-fund --prefer-offline >> /tmp/v7.4-check.log 2>&1
          code=$?
          cat /tmp/v7.4-check.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build
        id: build
        if: steps.patch.outputs.exit_code == '0' && steps.install.outputs.exit_code == '0'
        shell: bash
        run: |
          set +e
          npm run build >> /tmp/v7.4-check.log 2>&1
          code=$?
          cat /tmp/v7.4-check.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Generate static output
        id: generate
        if: steps.patch.outputs.exit_code == '0' && steps.install.outputs.exit_code == '0' && steps.build.outputs.exit_code == '0'
        shell: bash
        run: |
          set +e
          npm run generate >> /tmp/v7.4-check.log 2>&1
          code=$?
          cat /tmp/v7.4-check.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Firestore rules tests
        id: rules
        if: steps.patch.outputs.exit_code == '0' && steps.install.outputs.exit_code == '0' && steps.build.outputs.exit_code == '0' && steps.generate.outputs.exit_code == '0'
        shell: bash
        run: |
          set +e
          npm run test:rules >> /tmp/v7.4-check.log 2>&1
          code=$?
          cat /tmp/v7.4-check.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit verification diagnostic
        if: always() && (steps.patch.outputs.exit_code != '0' || steps.install.outputs.exit_code != '0' || steps.build.outputs.exit_code != '0' || steps.generate.outputs.exit_code != '0' || steps.rules.outputs.exit_code != '0')
        shell: bash
        run: |
          git reset --hard HEAD
          cp /tmp/v7.4-check.log v7.4-patch-error.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f v7.4-patch-error.log
          git commit -m "chore: record v7.4 verification failure"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          exit 1

      - name: Commit verified V7.4 changes
        if: steps.patch.outputs.exit_code == '0' && steps.install.outputs.exit_code == '0' && steps.build.outputs.exit_code == '0' && steps.generate.outputs.exit_code == '0' && steps.rules.outputs.exit_code == '0'
        shell: bash
        run: |
          rm -f .github/workflows/apply-v7.4.yml .github/workflows/trigger-v7.4-pr.yml v7.4-patch-error.log
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: stabilize v7.4 print invoice and inventory"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
