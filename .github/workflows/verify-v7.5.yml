name: Verify final V7.5 diagnostics

on:
  pull_request:
    branches:
      - feature/v7.4-stability-fixes
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  verify:
    if: github.event.pull_request.head.ref == 'feature/v7.5-transaction-hardening' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout V7.5
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install pnpm and dependencies
        run: |
          npm install --global pnpm@9.15.9 --no-audit --no-fund
          pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Run all Firestore tests
        id: tests
        shell: bash
        run: |
          set +e
          pnpm run test:rules > /tmp/v7.5-final-tests.log 2>&1
          code=$?
          cat /tmp/v7.5-final-tests.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record test diagnostic
        if: steps.tests.outputs.exit_code != '0'
        shell: bash
        run: |
          cp /tmp/v7.5-final-tests.log v7.5-final-tests-error.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f v7.5-final-tests-error.log
          git commit -m "chore: record final v7.5 test failure"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          exit 1

      - name: Confirm tests pass
        if: steps.tests.outputs.exit_code == '0'
        run: echo "All Firestore tests passed."
