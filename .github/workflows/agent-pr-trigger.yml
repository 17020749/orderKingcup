name: Agent PR trigger

on:
  pull_request:
    branches:
      - dev
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/unify-view-all-actions' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unify-view-all-actions
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Extract and run patch
        run: |
          python3 - <<'EXTRACT'
          from pathlib import Path
          source = Path('.github/workflows/agent-unify-view-all.yml').read_text()
          marker = "          python3 - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("          PY\n", start)
          body = source[start:end]
          body = '\n'.join(line[10:] if line.startswith('          ') else line for line in body.splitlines()) + '\n'
          Path('/tmp/patch.py').write_text(body)
          EXTRACT
          set +e
          python3 /tmp/patch.py > agent-patch-error.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            cat agent-patch-error.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add agent-patch-error.log
            git commit -m "record permission patch error"
            git push origin HEAD:agent/unify-view-all-actions
            exit "$status"
          fi
          rm agent-patch-error.log
      - run: npm ci
      - run: node --test tests/permission-matrix.client.test.mjs tests/view-all-action-scopes.client.test.mjs
      - run: npm run test:rules
      - name: Commit final changes
        run: |
          rm .github/workflows/agent-unify-view-all.yml .github/workflows/agent-pr-trigger.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "unify view all action scopes"
          git push origin HEAD:agent/unify-view-all-actions
