name: Phase 4 Apply

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - .phase4-transfer/trigger

permissions:
  contents: write

concurrency:
  group: phase4-apply-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    name: Verify and commit Phase 4 source
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NUXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
      NUXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.invalid
      NUXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
      NUXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder
      NUXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
      NUXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000000000'
      NUXT_PUBLIC_APP_NAME: KINGCUP CI

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: perf/phase-4-cursor-dashboard
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Pin npm
        run: npm install --global npm@10.9.2 --no-audit --no-fund

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Reconstruct and verify source archive
        shell: bash
        run: |
          cat \
            .phase4-transfer/chunk-00 \
            .phase4-transfer/rest-00 \
            .phase4-transfer/rest-01-* \
            .phase4-transfer/rest-02 \
            .phase4-transfer/rest-03 \
            > /tmp/phase4-files.tar.gz.b64
          base64 --decode /tmp/phase4-files.tar.gz.b64 > /tmp/phase4-files.tar.gz
          echo '53add98bcf8090ea181e57838dacf5d0096e2ec27dfeaad6c4abdbf2330e11cd  /tmp/phase4-files.tar.gz' | sha256sum --check --strict
          tar -xzf /tmp/phase4-files.tar.gz -C .
          git diff --check

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Prepare Nuxt
        run: npx --no-install nuxi prepare

      - name: Test cursor pagination
        run: npm run test:pagination

      - name: Validate Firestore indexes
        run: npm run test:indexes

      - name: Build
        run: npm run build

      - name: Generate static site
        run: npm run generate

      - name: Firestore Rules and concurrency tests
        run: npm run test:rules

      - name: Commit verified Phase 4 source
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          rm -rf .phase4-transfer
          git add -A .phase4-transfer
          git add \
            components/CursorLoadMore.vue \
            composables/useScopedQueries.ts \
            docs/cursor-pagination-dashboard.md \
            package.json \
            pages/dashboard.vue \
            pages/orders.vue \
            pages/payments.vue \
            pages/invoices.vue \
            pages/shipments.vue \
            pages/imports.vue \
            pages/exports.vue \
            pages/inventory-adjustments.vue \
            tests/cursor-pagination.test.mjs \
            tests/dashboard-aggregation.rules.test.mjs \
            utils/cursorPagination.mjs
          git diff --cached --check
          git commit -m 'perf(firestore): add cursor pagination and dashboard aggregates'
          git push origin HEAD:perf/phase-4-cursor-dashboard
