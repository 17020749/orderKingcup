name: Capture Step 6 Log

on:
  push:
    branches:
      - agent/step-6-printing-delete-lock
    paths:
      - .github/workflows/capture-step6-log.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step-6-printing-delete-lock
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
      - uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Run isolated tests
        shell: bash
        run: |
          set +e
          pnpm exec firebase emulators:exec --only firestore "node --test --test-concurrency=1 tests/order-printing-delete-lock.client.test.mjs tests/order-printing-delete-lock.rules.test.mjs tests/printing-owner.rules.test.mjs" > step6-isolated.log 2>&1
          echo "EXIT_CODE=$?" >> step6-isolated.log
          exit 0
      - name: Commit log and remove diagnostics
        run: |
          rm -f .github/workflows/capture-step6-log.yml .github/workflows/diagnose-step6-isolated.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add step6-isolated.log .github/workflows/capture-step6-log.yml .github/workflows/diagnose-step6-isolated.yml
          git commit -m "chore(step6): capture isolated test failure"
          git push origin HEAD:agent/step-6-printing-delete-lock
