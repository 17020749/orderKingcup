name: Cleanup shipment patch workflow

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  cleanup:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/fix-order-payment-export-permissions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false

      - name: Restore Warehouse CI from dev
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/contents/.github/workflows/warehouse-ci.yml?ref=dev" > /tmp/dev-workflow.json
          current_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/.github/workflows/warehouse-ci.yml?ref=${TARGET_BRANCH}" --jq .sha)"
          export CURRENT_SHA="$current_sha"
          node <<'NODE' > /tmp/restore-workflow.json
          const fs = require('node:fs')
          const source = JSON.parse(fs.readFileSync('/tmp/dev-workflow.json', 'utf8'))
          process.stdout.write(JSON.stringify({
            message: 'restore warehouse ci workflow',
            content: String(source.content || '').replace(/\s+/g, ''),
            sha: process.env.CURRENT_SHA,
            branch: process.env.TARGET_BRANCH,
          }))
          NODE
          gh api \
            --method PUT \
            "repos/${GITHUB_REPOSITORY}/contents/.github/workflows/warehouse-ci.yml" \
            --input /tmp/restore-workflow.json

      - name: Remove this temporary workflow
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          workflow_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/.github/workflows/apply-shipment-rules-patch.yml?ref=${TARGET_BRANCH}" --jq .sha)"
          export WORKFLOW_SHA="$workflow_sha"
          node <<'NODE' > /tmp/delete-workflow.json
          process.stdout.write(JSON.stringify({
            message: 'remove temporary shipment rules workflow',
            sha: process.env.WORKFLOW_SHA,
            branch: process.env.TARGET_BRANCH,
          }))
          NODE
          gh api \
            --method DELETE \
            "repos/${GITHUB_REPOSITORY}/contents/.github/workflows/apply-shipment-rules-patch.yml" \
            --input /tmp/delete-workflow.json
