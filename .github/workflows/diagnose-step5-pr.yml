name: Diagnose Step 5 PR

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
          run_install: false

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Run and report isolated tests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set +e
          pnpm run test:rules > step5-output.log 2>&1
          code=$?
          {
            echo '## Step 5 isolated test output'
            echo
            echo '```text'
            tail -n 180 step5-output.log
            echo '```'
            echo
            echo "Exit code: $code"
          } > step5-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file step5-comment.md
          exit "$code"
