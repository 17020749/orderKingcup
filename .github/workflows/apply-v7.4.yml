name: Apply V7.4 stability fixes

on:
  push:
    branches:
      - feature/v7.4-stability-fixes

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java for Firestore emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Apply guarded source patches
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file_path = Path(path)
              text = file_path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}\n--- expected ---\n{old}')
              file_path.write_text(text.replace(old, new, 1), encoding='utf-8')

          # 1) Print templates: render only real product rows.
          replace_once(
              'components/OrderPrintModal.vue',
              """function padRows<T>(rows: T[], minRows = 15) {
            return [...rows, ...Array.from({ length: Math.max(0, minRows - rows.length) }, () => null)]
          }

          """,
              ''
          )
          replace_once(
              'components/OrderPrintModal.vue',
              """  const itemRows = padRows(rows).map((item: any, index) => item ? `
            <tr>
              <td class=\"center\">${index + 1}</td>
              <td>${escapeHtml(productDisplayName(item))}</td>
              <td class=\"center\">${escapeHtml(item.unit || '')}</td>
              <td class=\"right\">${formatNumber(item.quantity)}</td>
              <td class=\"right\">${formatMoney(item.unitPrice)}</td>
              <td class=\"right\">${formatMoney(item.lineTotal)}</td>
            </tr>` : `
            <tr><td class=\"center\">${index + 1}</td><td></td><td></td><td></td><td></td><td></td></tr>`).join('')
          """,
              """  const itemRows = rows.map((item: any, index) => `
            <tr>
              <td class=\"center\">${index + 1}</td>
              <td>${escapeHtml(productDisplayName(item))}</td>
              <td class=\"center\">${escapeHtml(item.unit || '')}</td>
              <td class=\"right\">${formatNumber(item.quantity)}</td>
              <td class=\"right\">${formatMoney(item.unitPrice)}</td>
              <td class=\"right\">${formatMoney(item.lineTotal)}</td>
            </tr>`).join('')
          """
          )
          replace_once(
              'components/OrderPrintModal.vue',
              """  const itemRows = padRows(rows).map((item: any, index) => {
            if (!item) return `<tr><td class=\"center\">${index + 1}</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>`
          """,
              """  const itemRows = rows.map((item: any, index) => {
          """
          )

          # 2) Print bridge: keep lightweight row integration, enforce orders.print,
          #    and remove the global window.open monkeypatch entirely.
          Path('components/OrderPrintActionsBridge.vue').write_text("""<script setup lang=\"ts\">
          import type { OrderDoc, OrderItemDoc } from '~/types/models'

          const route = useRoute()
          const { hasPermission } = useAuth()
          const { showToast } = useUi()
          const {
            loadScopedOrders,
            loadScopedOrderItems,
            loadScopedExportRequests,
          } = useScopedQueries()

          const selectedOrder = ref<OrderDoc | null>(null)
          const selectedItems = ref<OrderItemDoc[]>([])
          const selectedRequests = ref<any[]>([])
          let observer: MutationObserver | null = null
          let installTimer: ReturnType<typeof setTimeout> | null = null

          function orderCodeFromRow(row: HTMLTableRowElement | null) {
            return String(row?.querySelector('td:first-child b')?.textContent || '').trim()
          }

          async function openPrint(code: string, button: HTMLButtonElement) {
            if (!hasPermission('orders.print')) {
              showToast('Bạn không có quyền in đơn hàng.', 'error')
              return
            }

            const oldText = button.textContent
            button.disabled = true
            button.textContent = 'Đang tải...'

            try {
              const orders = await loadScopedOrders(true)
              const order = orders.find(row => String(row.order_code || '').trim() === code)
              if (!order) {
                showToast(`Không tìm thấy đơn hàng ${code} hoặc bạn không có quyền xem đơn này.`, 'error')
                return
              }

              const [items, requests] = await Promise.all([
                loadScopedOrderItems(orders, true),
                loadScopedExportRequests(orders, true),
              ])

              selectedOrder.value = order
              selectedItems.value = items.filter(item => item.order_id === order.id)
              selectedRequests.value = requests.filter(request => request.order_id === order.id)
            } catch (error: any) {
              showToast(error?.message || 'Không tải được dữ liệu để in đơn hàng.', 'error')
            } finally {
              button.disabled = false
              button.textContent = oldText || 'In'
            }
          }

          function installPrintButtons() {
            if (route.path !== '/orders' || !hasPermission('orders.print')) return

            document.querySelectorAll<HTMLElement>('.main .card .action-buttons').forEach(container => {
              if (container.querySelector('.order-print-trigger')) return

              const row = container.closest('tr') as HTMLTableRowElement | null
              const orderCode = orderCodeFromRow(row)
              if (!orderCode) return

              const button = document.createElement('button')
              button.type = 'button'
              button.className = 'btn-sm order-print-trigger'
              button.textContent = 'In'
              button.title = `In chứng từ cho đơn ${orderCode}`
              button.addEventListener('click', () => openPrint(orderCode, button))
              container.appendChild(button)
            })
          }

          function scheduleInstall() {
            if (installTimer) clearTimeout(installTimer)
            installTimer = setTimeout(() => {
              installTimer = null
              installPrintButtons()
            }, 30)
          }

          function startObserver() {
            stopObserver()
            if (route.path !== '/orders' || !hasPermission('orders.print')) return

            observer = new MutationObserver(scheduleInstall)
            observer.observe(document.body, { childList: true, subtree: true })
            scheduleInstall()
          }

          function stopObserver() {
            observer?.disconnect()
            observer = null
            if (installTimer) clearTimeout(installTimer)
            installTimer = null
          }

          function closePrint() {
            selectedOrder.value = null
            selectedItems.value = []
            selectedRequests.value = []
          }

          watch(() => [route.path, hasPermission('orders.print')], async () => {
            await nextTick()
            startObserver()
          }, { immediate: true })

          onMounted(startObserver)
          onBeforeUnmount(stopObserver)
          </script>

          <template>
            <OrderPrintModal
              v-if=\"selectedOrder\"
              :order=\"selectedOrder\"
              :items=\"selectedItems\"
              :requests=\"selectedRequests\"
              @close=\"closePrint\"
            />
          </template>
          """, encoding='utf-8')

          # 3) Orders: invoice status is editable only with invoice permission and
          #    is written atomically with the normal order edit when authorized.
          replace_once(
              'pages/orders.vue',
              "const canEditOrders = computed(() => hasPermission('orders.edit'))\n",
              """const canEditOrders = computed(() => hasPermission('orders.edit'))
          const canManageInvoiceStatus = computed(() => editing.value
            ? hasPermission('invoices.edit')
            : hasPermission('invoices.create')
          )
          """
          )
          replace_once(
              'pages/orders.vue',
              """    const baseOrder: any = { ...form, ...totals }
              if (editing.value) {
                // These fields are maintained by their dedicated modules. Omitting them
                // prevents a normal order edit from overwriting payment/warehouse/invoice
                // state or reviving a soft-deleted document.
                ;[
                  'paid_amount', 'debt_amount', 'computed_payment_status', 'payment_status',
                  'payment_count', 'deposit_count', 'collect_count',
                  'warehouse_fulfillment_status', 'warehouse_request_status',
                  'invoice_status', 'deleted', 'active', 'status', 'deleted_at', 'created_at'
                ].forEach(key => delete baseOrder[key])
              }
          """,
              """    const baseOrder: any = { ...form, ...totals }
              if (editing.value) {
                // Payment, warehouse and deletion state remain protected. Invoice status
                // may be included only when the current user has the dedicated permission.
                const protectedFields = [
                  'paid_amount', 'debt_amount', 'computed_payment_status', 'payment_status',
                  'payment_count', 'deposit_count', 'collect_count',
                  'warehouse_fulfillment_status', 'warehouse_request_status',
                  'deleted', 'active', 'status', 'deleted_at', 'created_at'
                ]
                if (!canManageInvoiceStatus.value) protectedFields.push('invoice_status')
                protectedFields.forEach(key => delete baseOrder[key])
              }
          """
          )
          replace_once(
              'pages/orders.vue',
              """      created_by: createdBy,
                items_count: localItems.length,
          """,
              """      created_by: createdBy,
                invoice_status: editing.value && !canManageInvoiceStatus.value
                  ? (editing.value.invoice_status || 'Không xuất')
                  : (form.invoice_status || 'Không xuất'),
                items_count: localItems.length,
          """
          )
          replace_once(
              'pages/orders.vue',
              """        <div class=\"form-group\"><label>Hóa đơn</label><select v-model=\"form.invoice_status\" class=\"select\"><option v-for=\"s in INVOICE_STATUS_OPTIONS\" :key=\"s\" :value=\"s\">{{ s }}</option></select></div>
          """,
              """        <div class=\"form-group\">
                  <label>Hóa đơn</label>
                  <select v-model=\"form.invoice_status\" class=\"select\" :disabled=\"!canManageInvoiceStatus\">
                    <option v-for=\"s in INVOICE_STATUS_OPTIONS\" :key=\"s\" :value=\"s\">{{ s }}</option>
                  </select>
                  <div v-if=\"!canManageInvoiceStatus\" class=\"small subtle\">Bạn không có quyền thay đổi trạng thái hóa đơn.</div>
                </div>
          """
          )

          # 4) Inventory: inventory viewers can load active products solely for
          #    visibility filtering, and deleted products never appear in balances.
          replace_once('pages/inventory.vue', "const { hasPermission } = useAuth()\n", '')
          replace_once(
              'pages/inventory.vue',
              """const canValidateProducts = computed(() => hasPermission('*') || hasPermission('products.view'))
          const activeProductIds = computed(() => new Set(products.value.map(row => String(row.id || '').trim()).filter(Boolean)))
          """,
              """const activeProductIds = computed(() => new Set(products.value.map(row => String(row.id || '').trim()).filter(Boolean)))
          """
          )
          replace_once(
              'pages/inventory.vue',
              """function productIsVisible(row: any) {
            if (!canValidateProducts.value) return true
            return activeProductIds.value.has(String(row?.product_id || '').trim())
          }
          """,
              """function productIsVisible(row: any) {
            return activeProductIds.value.has(String(row?.product_id || '').trim())
          }
          """
          )
          replace_once(
              'pages/inventory.vue',
              "    products.value = productRows\n",
              "    products.value = productRows.filter(row => row.deleted !== true && row.active !== false && String(row.status || '').trim().toLowerCase() !== 'deleted')\n"
          )
          replace_once(
              'composables/useScopedQueries.ts',
              "    if (!hasPermission('products.view') && !hasPermission('*')) return []\n",
              "    if (!hasPermission('products.view') && !hasPermission('inventory.view') && !hasPermission('*')) return []\n"
          )

          # 5) Firestore Rules: permit atomic invoice edits for users who also have
          #    invoice permission, allow inventory viewers to read products for filtering,
          #    and disable hard delete for customers/products.
          replace_once(
              'firestore.rules',
              """    function normalOrderEditKeepsSystemFields() {
                return unchanged([
                  'paid_amount',
                  'debt_amount',
                  'computed_payment_status',
                  'payment_status',
                  'payment_count',
                  'deposit_count',
                  'collect_count',
                  'warehouse_fulfillment_status',
                  'warehouse_request_status',
                  'invoice_status',
                  'deleted',
                  'active',
                  'status',
                  'deleted_at'
                ]);
              }
          """,
              """    function normalOrderEditKeepsSystemFields() {
                return unchanged([
                    'paid_amount',
                    'debt_amount',
                    'computed_payment_status',
                    'payment_status',
                    'payment_count',
                    'deposit_count',
                    'collect_count',
                    'warehouse_fulfillment_status',
                    'warehouse_request_status',
                    'deleted',
                    'active',
                    'status',
                    'deleted_at'
                  ])
                  && (
                    unchanged(['invoice_status'])
                    || hasAnyPerm(['invoices.create', 'invoices.edit', 'invoices.delete'])
                  );
              }
          """
          )
          replace_once(
              'firestore.rules',
              """      allow delete: if isAdmin()
                || (
                  hasPerm('customers.delete')
                  && ownEmailField(resource.data, 'created_by')
                );
          """,
              """      // Customers are always removed through soft-delete updates.
                allow delete: if false;
          """
          )
          replace_once(
              'firestore.rules',
              "      allow read: if hasPerm('products.view');\n",
              "      allow read: if hasAnyPerm(['products.view', 'inventory.view']);\n"
          )
          replace_once(
              'firestore.rules',
              """      // Product deletion from the UI is intentionally a soft-delete so old
                // order items keep their historical product information.
                allow delete: if isAdmin();
          """,
              """      // Products are always removed through soft-delete updates so old order
                // and inventory history keeps its original product reference.
                allow delete: if false;
          """
          )

          # 6) Regression tests for V7.4 rules changes.
          test_file = Path('tests/firestore.rules.test.mjs')
          tests = test_file.read_text(encoding='utf-8')
          marker = "test('V7.4 cho phép sửa đơn và trạng thái hóa đơn nguyên tử khi đủ quyền'"
          if marker not in tests:
              tests += """

          test('V7.4 cho phép sửa đơn và trạng thái hóa đơn nguyên tử khi đủ quyền', async () => {
            const db = env.authenticatedContext(A, { email: A }).firestore()
            await assertSucceeds(updateDoc(doc(db, 'orders', 'order-a'), {
              note: 'Đã cập nhật',
              invoice_status: 'Khách lẻ',
              updated_at: 'now'
            }))
          })

          test('V7.4 chặn đổi trạng thái hóa đơn khi chỉ có quyền sửa đơn', async () => {
            const db = env.authenticatedContext(EDITOR, { email: EDITOR }).firestore()
            await assertFails(updateDoc(doc(db, 'orders', 'order-editor'), {
              note: 'Cố đổi hóa đơn',
              invoice_status: 'Khách lẻ',
              updated_at: 'now'
            }))
          })

          test('V7.4 inventory viewer đọc được sản phẩm để lọc sản phẩm đã xóa', async () => {
            const db = env.authenticatedContext(INVENTORY_VIEWER, { email: INVENTORY_VIEWER }).firestore()
            await assertSucceeds(getDocs(collection(db, 'products')))
          })

          test('V7.4 không tài khoản nào được hard-delete khách hàng hoặc sản phẩm', async () => {
            const db = env.authenticatedContext(ADMIN, { email: ADMIN }).firestore()
            await assertFails(deleteDoc(doc(db, 'customers', 'customer-a')))
            await assertFails(deleteDoc(doc(db, 'products', 'product-existing')))
          })
          """
              test_file.write_text(tests, encoding='utf-8')
          PY

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate static output
        run: npm run generate

      - name: Firestore rules tests
        run: npm run test:rules

      - name: Commit verified V7.4 changes
        shell: bash
        run: |
          rm -f .github/workflows/apply-v7.4.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: stabilize v7.4 print invoice and inventory"
          git push origin "HEAD:${GITHUB_REF_NAME}"
