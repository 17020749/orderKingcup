name: Update Step 7 Regressions

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  update:
    if: github.head_ref == 'agent/step-7-atomic-finance-shipping'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step-7-atomic-finance-shipping
          fetch-depth: 0
      - name: Check state
        id: state
        run: |
          if grep -q "User A tạo payment chuẩn cho order A bằng batch nguyên tử" tests/firestore.rules.test.mjs; then
            echo "applied=true" >> "$GITHUB_OUTPUT"
          else
            echo "applied=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Apply updates
        if: steps.state.outputs.applied == 'false'
        run: python3 scripts/update-step7-regressions.py
      - name: Commit updates
        if: steps.state.outputs.applied == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/firestore.rules.test.mjs tests/order-printing-delete-lock.rules.test.mjs pages/orders.vue
          git commit -m "test(step7): migrate legacy relation flows to atomic writes"
          git push origin HEAD:agent/step-7-atomic-finance-shipping
