name: Apply Step 5 Atomic Patch

on:
  push:
    branches:
      - agent/step-5-atomic-order-save
    paths:
      - scripts/apply-step5-patch.mjs
      - .github/workflows/apply-step5-patch.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/step-5-atomic-order-save
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.4

      - name: Apply source patch
        run: node scripts/apply-step5-patch.mjs

      - name: Commit patched source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pages/orders.vue firestore.rules package.json scripts/apply-step5-patch.mjs .github/workflows/apply-step5-patch.yml
          git commit -m "feat(orders): make order save atomic"
          git push origin HEAD:agent/step-5-atomic-order-save
