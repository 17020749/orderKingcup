name: Optimize Step 8 Rules

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  optimize:
    if: github.head_ref == 'agent/step-8-export-lifecycle'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step-8-export-lifecycle
          fetch-depth: 0
      - name: Check state
        id: state
        run: |
          if grep -q "function exportRequestReleaseAllowed" firestore.rules; then
            echo "applied=true" >> "$GITHUB_OUTPUT"
          else
            echo "applied=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Optimize rules
        if: steps.state.outputs.applied == 'false'
        run: python3 scripts/optimize-step8-rules.py
      - name: Commit rules
        if: steps.state.outputs.applied == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add firestore.rules
          git commit -m "fix(step8): dispatch export lifecycle rules by marker"
          git push origin HEAD:agent/step-8-export-lifecycle
