name: Compact Step 7 Rules

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  compact:
    if: github.head_ref == 'agent/step-7-atomic-finance-shipping'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step-7-atomic-finance-shipping
          fetch-depth: 0
      - name: Check state
        id: state
        run: |
          if grep -q "Reads the parent only once for child validation" firestore.rules; then
            echo "applied=true" >> "$GITHUB_OUTPUT"
          else
            echo "applied=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Apply compact rules
        if: steps.state.outputs.applied == 'false'
        run: python3 scripts/compact-step7-rules.py
      - name: Commit rules
        if: steps.state.outputs.applied == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add firestore.rules
          git commit -m "fix(step7): compact atomic relation rules"
          git push origin HEAD:agent/step-7-atomic-finance-shipping
