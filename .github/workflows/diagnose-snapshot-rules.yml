name: Diagnose snapshot rules

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'agent/warehouse-request-snapshot-isolation'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/warehouse-request-snapshot-isolation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm install --global npm@10.9.2 --no-audit --no-fund
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Run all rules tests and capture failure
        shell: bash
        run: |
          rm -f RULES_TEST_ERROR.txt
          set +e
          npm run test:rules > /tmp/rules.log 2>&1
          status=$?
          cat /tmp/rules.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/rules.log RULES_TEST_ERROR.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add RULES_TEST_ERROR.txt
            git commit -m "Record snapshot rules regression failure" || true
            git push origin HEAD:agent/warehouse-request-snapshot-isolation || true
            exit "$status"
          fi
          rm -f .github/workflows/diagnose-snapshot-rules.yml RULES_TEST_ERROR.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove snapshot rules diagnostic workflow"
          git push origin HEAD:agent/warehouse-request-snapshot-isolation
