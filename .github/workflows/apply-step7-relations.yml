name: Apply Step 7 Relation Patches

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/step-7-atomic-finance-shipping'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step-7-atomic-finance-shipping
          fetch-depth: 0
          show-progress: false
      - name: Fix patcher
        run: python3 scripts/fix-step7-patcher.py
      - name: Apply patches
        id: patch
        continue-on-error: true
        run: python3 scripts/apply-step7-relations.py > step7-patch-error.txt 2>&1
      - name: Persist patch error
        if: steps.patch.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add step7-patch-error.txt
          git commit -m "chore(step7): record patch failure" || true
          git push origin HEAD:agent/step-7-atomic-finance-shipping
          exit 1
      - name: Commit patched source
        if: steps.patch.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm scripts/apply-step7-relations.py scripts/fix-step7-patcher.py .github/workflows/apply-step7-relations.yml
          rm -f step7-patch-error.txt
          git add firestore.rules pages/orders.vue types/models.ts
          git commit -m "feat(step7): enforce atomic order relation consistency"
          git push origin HEAD:agent/step-7-atomic-finance-shipping
