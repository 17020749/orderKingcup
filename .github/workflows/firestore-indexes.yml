name: Firestore Indexes

on:
  pull_request:
    branches:
      - dev
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'firebase.json'
      - 'firestore.indexes.json'
      - 'scripts/firestore-index-validation.mjs'
      - 'scripts/validate-firestore-indexes.mjs'
      - 'tests/firestore-indexes.test.mjs'
      - 'package.json'
      - '.github/workflows/firestore-indexes.yml'
  push:
    branches:
      - dev
      - main
    paths:
      - 'firebase.json'
      - 'firestore.indexes.json'
      - 'scripts/firestore-index-validation.mjs'
      - 'scripts/validate-firestore-indexes.mjs'
      - 'tests/firestore-indexes.test.mjs'
      - 'package.json'
      - '.github/workflows/firestore-indexes.yml'
  workflow_dispatch:
    inputs:
      target:
        description: Firebase target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      confirm_project_id:
        description: Type the exact Firebase project ID for the selected target
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: firestore-indexes-${{ github.event.pull_request.number || inputs.target || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  validate:
    name: Validate index configuration
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Pin npm
        run: npm install --global npm@10.9.2 --no-audit --no-fund

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Validate Firestore indexes
        run: npm run test:indexes

  deploy:
    name: Deploy indexes to ${{ inputs.target }}
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: ${{ inputs.target == 'production' && 'production' || 'dev' }}
    env:
      EXPECTED_FIREBASE_PROJECT_ID: ${{ inputs.target == 'production' && 'orderfirestore-501909' || 'kingcupmanagerstaging' }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Pin npm
        run: npm install --global npm@10.9.2 --no-audit --no-fund

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Validate selected project
        shell: bash
        env:
          CONFIRMED_PROJECT_ID: ${{ inputs.confirm_project_id }}
        run: |
          node <<'NODE'
          const expected = process.env.EXPECTED_FIREBASE_PROJECT_ID || ''
          const confirmed = String(process.env.CONFIRMED_PROJECT_ID || '').trim()
          if (!expected || confirmed !== expected) {
            console.error(`::error::Project confirmation mismatch. Expected exactly: ${expected}`)
            process.exit(1)
          }
          NODE

      - name: Validate deployment service account
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          node <<'NODE'
          let serviceAccount
          try {
            serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT || '')
          } catch {
            console.error('::error::FIREBASE_SERVICE_ACCOUNT is not valid JSON')
            process.exit(1)
          }
          if (serviceAccount.project_id !== process.env.EXPECTED_FIREBASE_PROJECT_ID) {
            console.error(
              `::error::Service account belongs to ${serviceAccount.project_id || 'unknown'}; ` +
              `expected ${process.env.EXPECTED_FIREBASE_PROJECT_ID}`
            )
            process.exit(1)
          }
          NODE

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Validate Firestore indexes again
        run: npm run test:indexes

      - name: Deploy Firestore indexes
        run: >-
          npx --no-install firebase deploy
          --only firestore:indexes
          --project "$EXPECTED_FIREBASE_PROJECT_ID"
          --non-interactive
