name: Validate searchable select

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - reopened
      - synchronize

jobs:
  validate:
    if: github.event.pull_request.head.ref == 'agent/fix-searchable-select'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-searchable-select
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npx --no-install nuxi prepare
      - run: npm run build
