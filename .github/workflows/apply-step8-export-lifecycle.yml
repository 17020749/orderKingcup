name: Apply Step 8 Export Lifecycle

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/step-8-export-lifecycle'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step-8-export-lifecycle
          fetch-depth: 0
          show-progress: false
      - name: Check patch state
        id: state
        run: |
          if grep -q "async function cancelExportRequestRelease" composables/useWarehouseTransactions.ts; then
            echo "applied=true" >> "$GITHUB_OUTPUT"
          else
            echo "applied=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Fix patcher
        if: steps.state.outputs.applied == 'false'
        run: python3 scripts/fix-step8-patcher.py
      - name: Apply Step 8 patches
        if: steps.state.outputs.applied == 'false'
        run: python3 scripts/apply-step8-export-lifecycle.py
      - name: Commit patched source
        if: steps.state.outputs.applied == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add composables/useWarehouseTransactions.ts pages/warehouse-export-requests.vue firestore.rules types/models.ts package.json
          git commit -m "feat(step8): enforce atomic export request lifecycle"
          git push origin HEAD:agent/step-8-export-lifecycle
