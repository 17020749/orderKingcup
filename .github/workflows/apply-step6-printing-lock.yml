name: Apply Step 6 Printing Lock

on:
  push:
    branches:
      - agent/step-6-printing-delete-lock
    paths:
      - .github/workflows/apply-step6-printing-lock.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: agent/step-6-printing-delete-lock
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'

      - name: Apply Step 6 patch
        run: node scripts/apply-step6-printing-lock.mjs

      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(orders): lock deletion while printing progress exists"
          git push origin HEAD:agent/step-6-printing-delete-lock
