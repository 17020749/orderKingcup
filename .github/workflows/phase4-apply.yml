name: Phase 4 Corrected Rules Diagnostic

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - .phase4-transfer/trigger

permissions:
  contents: write

concurrency:
  group: phase4-corrected-rules-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  diagnostic:
    name: Capture corrected Phase 4 Rules failure
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: fix/phase-4-completion
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Pin npm
        run: npm install --global npm@10.9.2 --no-audit --no-fund

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Reconstruct verified Phase 4 source
        shell: bash
        run: |
          cat \
            .phase4-transfer/chunk-00 \
            .phase4-transfer/rest-00 \
            .phase4-transfer/rest-01-* \
            .phase4-transfer/rest-02 \
            .phase4-transfer/rest-03-00 \
            .phase4-transfer/rest-03-01 \
            .phase4-transfer/rest-03-02-* \
            > /tmp/phase4-files.tar.gz.b64
          base64 --decode /tmp/phase4-files.tar.gz.b64 > /tmp/phase4-files.tar.gz
          echo '53add98bcf8090ea181e57838dacf5d0096e2ec27dfeaad6c4abdbf2330e11cd  /tmp/phase4-files.tar.gz' | sha256sum --check --strict
          tar -xzf /tmp/phase4-files.tar.gz -C .

      - name: Apply corrected dashboard aggregate split
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          scoped_path = Path('composables/useScopedQueries.ts')
          scoped = scoped_path.read_text(encoding='utf-8')
          start_marker = "    const active = [where('active', '==', true), where('deleted', '==', false)]"
          end_marker = "        exportRequests: requestCount.data().count,\n      },"
          start = scoped.find(start_marker)
          end = scoped.find(end_marker, start)
          if start < 0 or end < 0:
              raise SystemExit('Dashboard aggregate section not found')
          end += len(end_marker)
          replacement = """    const active = [where('active', '==', true), where('deleted', '==', false)]
              const activeOrders = query(collection(db, 'orders'), ...active)
              const [orderCount, orderRevenue, orderDebt, customerCount, productCount, paymentAggregate, itemAggregate, requestCount, orderPage, paymentPage] = await Promise.all([
                getCountFromServer(activeOrders),
                getAggregateFromServer(activeOrders, { revenue: sum('actual_revenue') }),
                getAggregateFromServer(activeOrders, { debt: sum('debt_amount') }),
                getCountFromServer(query(collection(db, 'customers'), ...active)),
                getCountFromServer(query(collection(db, 'products'), ...active)),
                getAggregateFromServer(query(collection(db, 'payments'), ...active, where('payment_status', '==', 'Đã nhận')), { paid: sum('amount') }),
                getAggregateFromServer(query(collection(db, 'order_items'), ...active), { profit: sum('line_profit') }),
                getCountFromServer(query(collection(db, 'order_export_requests'), ...active)),
                fetchOrderedPage<OrderDoc>('orders', 'created_at', null, 50),
                fetchOrderedPage<PaymentDoc>('payments', 'payment_date', null, 50),
              ])

              return {
                stats: {
                  orders: orderCount.data().count,
                  customers: customerCount.data().count,
                  products: productCount.data().count,
                  revenue: Number(orderRevenue.data().revenue || 0),
                  paid: Number(paymentAggregate.data().paid || 0),
                  debt: Number(orderDebt.data().debt || 0),
                  profit: Number(itemAggregate.data().profit || 0),
                  exportRequests: requestCount.data().count,
                },""".replace('\n              ', '\n    ').replace('\n                ', '\n      ').replace('\n                  ', '\n        ')
          scoped_path.write_text(scoped[:start] + replacement + scoped[end:], encoding='utf-8')

          test_path = Path('tests/dashboard-aggregation.rules.test.mjs')
          source = test_path.read_text(encoding='utf-8')
          start_marker = "  const orders = await assertSucceeds(getAggregateFromServer(query(collection(db, 'orders'), ...active), {"
          end_marker = "  assert.equal(orders.data().debt, 800)"
          start = source.find(start_marker)
          end = source.find(end_marker, start)
          if start < 0 or end < 0:
              raise SystemExit('Combined aggregate test not found')
          end += len(end_marker)
          replacement = """  const activeOrders = query(collection(db, 'orders'), ...active)
            const orderCount = await assertSucceeds(getCountFromServer(activeOrders))
            const orderRevenue = await assertSucceeds(getAggregateFromServer(activeOrders, { revenue: sum('actual_revenue') }))
            const orderDebt = await assertSucceeds(getAggregateFromServer(activeOrders, { debt: sum('debt_amount') }))
            assert.equal(orderCount.data().count, 2)
            assert.equal(orderRevenue.data().revenue, 3000)
            assert.equal(orderDebt.data().debt, 800)""".replace('\n            ', '\n  ')
          test_path.write_text(source[:start] + replacement + source[end:], encoding='utf-8')
          PY

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run full Rules suite and retain log
        id: rules
        shell: bash
        run: |
          set +e
          npm run test:rules 2>&1 | tee .phase4-transfer/corrected-rules-diagnostic.log
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit diagnostic log
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f .phase4-transfer/corrected-rules-diagnostic.log
          git commit -m 'test(phase4): capture corrected Rules failure'
          git push origin HEAD:fix/phase-4-completion

      - name: Fail when Rules suite failed
        if: steps.rules.outputs.exit_code != '0'
        run: exit 1
