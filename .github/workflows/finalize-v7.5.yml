name: Finalize V7.5 once

on:
  push:
    branches:
      - feature/v7.5-transaction-hardening
    paths:
      - .github/workflows/finalize-v7.5.yml

permissions:
  contents: write

concurrency:
  group: finalize-v7.5-once
  cancel-in-progress: true

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout V7.5
        uses: actions/checkout@v4
        with:
          ref: feature/v7.5-transaction-hardening
          fetch-depth: 0
          persist-credentials: true

      - name: Apply final V7.5 corrections
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str, label: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: cần đúng 1 vị trí, tìm thấy {count}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'composables/useWarehouseTransactions.ts',
              """  const status = String(data?.status || '')
            if (!['pending', 'completed'].includes(status)) {
              throw new Error(`operation_id đang ở trạng thái không hợp lệ: ${status || 'trống'}.`)
            }
          """,
              """  const status = String(data?.status || '')
            if (!['pending', 'processing', 'failed', 'completed'].includes(status)) {
              throw new Error(`operation_id đang ở trạng thái không hợp lệ: ${status || 'trống'}.`)
            }
          """,
              'operation status guard'
          )

          replace_once(
              'firestore.rules',
              """      allow update: if resource.data.get('operation_id', '') == docId
                && request.resource.data.get('operation_id', '') == docId
                && resource.data.get('created_by', '').lower() == email()
                && request.resource.data.get('created_by', '') == resource.data.get('created_by', '')
                && request.resource.data.get('action', '') == resource.data.get('action', '')
                && (
                  (
                    resource.data.get('status', '') == 'processing'
                    && ['completed', 'failed'].hasAny([request.resource.data.get('status', '')])
                  )
                  || (
                    ['failed', 'pending'].hasAny([resource.data.get('status', '')])
                    && request.resource.data.get('status', '') == 'processing'
                  )
                );
          """,
              """      allow update: if resource.data.get('operation_id', '') == docId
                && request.resource.data.get('operation_id', '') == docId
                && resource.data.get('created_by', '').lower() == email()
                && unchanged([
                  'operation_id',
                  'action',
                  'target_collection',
                  'target_id',
                  'created_by',
                  'created_at',
                  'source'
                ])
                && onlyChanged([
                  'status',
                  'processing_at',
                  'completed_at',
                  'failed_at',
                  'failure_message',
                  'result_code',
                  'target_revision'
                ])
                && (
                  (
                    resource.data.get('status', '') == 'processing'
                    && ['completed', 'failed'].hasAny([request.resource.data.get('status', '')])
                  )
                  || (
                    ['failed', 'pending'].hasAny([resource.data.get('status', '')])
                    && request.resource.data.get('status', '') == 'processing'
                  )
                );
          """,
              'warehouse operation update rule'
          )

          replace_once(
              'firestore.rules',
              """      allow create: if (
                  request.resource.data.get('operation_id', '') != ''
                  ? (
                    warehouseProcessingOperationOwned(request.resource.data.get('operation_id', ''))
                    && ownEmailField(request.resource.data, 'created_by')
                  )
                  : (
                    canWriteInventoryCore()
                    && ownEmailField(request.resource.data, 'created_by')
                  )
                )
                && quantityIsNumber(request.resource.data)
                && request.resource.data.get('quantity', 0) != 0;
          """,
              """      allow create: if canWriteInventoryCore()
                && request.resource.data.get('operation_id', '') != ''
                && quantityIsNumber(request.resource.data)
                && request.resource.data.get('quantity', 0) != 0
                && ownEmailField(request.resource.data, 'created_by');
          """,
              'stock movement create rule'
          )

          replace_once(
              'firestore.rules',
              """      allow create, update: if (
                  request.resource.data.get('last_operation_id', '') != ''
                  ? (
                    warehouseProcessingOperationOwned(request.resource.data.get('last_operation_id', ''))
                    && ownEmailField(request.resource.data, 'updated_by')
                  )
                  : canWriteInventoryCore()
                )
                && balanceQuantityIsSafe();
          """,
              """      allow create, update: if canWriteInventoryCore()
                && request.resource.data.get('last_operation_id', '') != ''
                && ownEmailField(request.resource.data, 'updated_by')
                && balanceQuantityIsSafe();
          """,
              'inventory balance write rule'
          )
          PY
          git diff --check

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        shell: bash
        run: |
          npm install --global pnpm@9.15.9 --no-audit --no-fund
          pnpm install --no-frozen-lockfile --ignore-scripts
          pnpm exec nuxi prepare

      - name: Build
        run: pnpm run build

      - name: Generate
        run: pnpm run generate

      - name: Firestore rules and concurrency tests
        run: pnpm run test:rules

      - name: Install official V7.5 CI and commit verified result
        shell: bash
        run: |
          rm -f .github/workflows/finalize-v7.5.yml
          cat > .github/workflows/v7.5-ci.yml <<'YAML'
          name: V7.5 CI

          on:
            workflow_dispatch:
            pull_request:
              branches:
                - feature/v7.4-stability-fixes
              types: [opened, synchronize, reopened, ready_for_review]

          permissions:
            contents: read

          concurrency:
            group: v7-5-ci-${{ github.event.pull_request.number || github.ref }}
            cancel-in-progress: true

          jobs:
            verify:
              if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'feature/v7.5-transaction-hardening'
              runs-on: ubuntu-latest
              timeout-minutes: 30
              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Setup Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: '20.19.4'

                - name: Setup Java 21
                  uses: actions/setup-java@v4
                  with:
                    distribution: temurin
                    java-version: '21'

                - name: Install dependencies
                  run: |
                    npm install --global pnpm@9.15.9 --no-audit --no-fund
                    pnpm install --no-frozen-lockfile --ignore-scripts
                    pnpm exec nuxi prepare

                - name: Build
                  run: pnpm run build

                - name: Generate
                  run: pnpm run generate

                - name: Firestore rules and concurrency tests
                  run: pnpm run test:rules
          YAML

          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add composables/useWarehouseTransactions.ts firestore.rules .github/workflows/v7.5-ci.yml .github/workflows/finalize-v7.5.yml
          git commit -m "fix: finalize v7.5 operation safety and add ci"
          git push origin HEAD:feature/v7.5-transaction-hardening
