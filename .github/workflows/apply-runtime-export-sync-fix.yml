name: Apply Runtime Export Sync Fix

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/runtime-export-and-sync-locks'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/runtime-export-and-sync-locks
          fetch-depth: 0
          show-progress: false
      - name: Check state
        id: state
        run: |
          if grep -q "async function cancelExportRequestRelease" composables/useWarehouseCostTransactions.ts && grep -q "function orderRelationReconcileAllowed" firestore.rules; then
            echo "applied=true" >> "$GITHUB_OUTPUT"
          else
            echo "applied=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Apply source patch
        if: steps.state.outputs.applied == 'false'
        run: python3 scripts/apply-runtime-export-sync-fix.py
      - name: Commit source patch
        if: steps.state.outputs.applied == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add composables/useWarehouseCostTransactions.ts firestore.rules
          git commit -m "fix(runtime): restore export cancel and relation reconciliation"
          git push origin HEAD:fix/runtime-export-and-sync-locks
