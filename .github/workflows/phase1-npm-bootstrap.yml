name: Phase 1 npm bootstrap

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  normalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Normalize npm lockfile and CI workflow
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs')

          const lockPath = 'package-lock.json'
          const workflowPath = '.github/workflows/warehouse-ci.yml'
          const bootstrapPath = '.github/workflows/phase1-npm-bootstrap.yml'
          const internalPrefix = 'https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/npm/npm-public/'
          const registryPrefix = 'https://registry.npmjs.org/'

          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'))
          const lock = JSON.parse(fs.readFileSync(lockPath, 'utf8'))
          const versionsBefore = new Map(
            Object.entries(lock.packages || {}).map(([path, pkg]) => [path, pkg?.version || null]),
          )

          let replacements = 0
          for (const pkg of Object.values(lock.packages || {})) {
            if (typeof pkg?.resolved === 'string' && pkg.resolved.startsWith(internalPrefix)) {
              pkg.resolved = registryPrefix + pkg.resolved.slice(internalPrefix.length)
              replacements += 1
            }
          }

          lock.packages[''].engines = packageJson.engines
          fs.writeFileSync(lockPath, `${JSON.stringify(lock, null, 2)}\n`)

          const versionsAfter = new Map(
            Object.entries(lock.packages || {}).map(([path, pkg]) => [path, pkg?.version || null]),
          )
          for (const [path, version] of versionsBefore) {
            if (versionsAfter.get(path) !== version) {
              throw new Error(`Dependency version changed for ${path}`)
            }
          }

          let workflow = fs.readFileSync(workflowPath, 'utf8')
          workflow = workflow.replaceAll(
            "          node-version: '20.19.4'\n",
            "          node-version: '20.19.4'\n          cache: npm\n          cache-dependency-path: package-lock.json\n",
          )
          workflow = workflow.replaceAll(
            "      - name: Setup pnpm\n        uses: pnpm/action-setup@v4\n        with:\n          version: '9.15.9'\n          run_install: false\n\n",
            "      - name: Pin npm\n        run: npm install --global npm@10.9.2 --no-audit --no-fund\n\n",
          )
          workflow = workflow.replaceAll(
            'pnpm install --no-frozen-lockfile --ignore-scripts',
            'npm ci --ignore-scripts --no-audit --no-fund',
          )
          workflow = workflow.replaceAll('pnpm exec nuxi prepare', 'npx --no-install nuxi prepare')
          workflow = workflow.replaceAll('pnpm run ', 'npm run ')
          workflow = workflow.replaceAll('pnpm exec firebase deploy', 'npx --no-install firebase deploy')

          if (workflow.includes('pnpm')) {
            throw new Error('warehouse-ci.yml still contains pnpm references')
          }
          fs.writeFileSync(workflowPath, workflow)
          fs.rmSync(bootstrapPath)

          console.log(`Normalized ${replacements} internal registry URLs`)
          NODE

      - name: Verify generated diff
        shell: bash
        run: |
          test "$(grep -c 'applied-caas-gateway1.internal.api.openai.org' package-lock.json || true)" = '0'
          test "$(grep -c 'pnpm' .github/workflows/warehouse-ci.yml || true)" = '0'
          git diff --check

      - name: Commit normalized npm toolchain
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json .github/workflows/warehouse-ci.yml .github/workflows/phase1-npm-bootstrap.yml
          git commit -m 'chore(deps): normalize npm lockfile and CI'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
