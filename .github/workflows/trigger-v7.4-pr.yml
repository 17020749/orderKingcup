name: Trigger V7.4 patch from pull request

on:
  pull_request:
    branches:
      - feature/v7.3-print-and-warehouse-search
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout V7.4 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java for Firestore emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Extract and apply guarded patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/apply-v7.4.yml').read_text(encoding='utf-8')
          start = "          python - <<'PY'\n"
          end = "\n          PY\n"
          if start not in source or end not in source:
              raise SystemExit('Không tìm thấy khối patch V7.4 trong workflow nguồn.')
          block = source.split(start, 1)[1].split(end, 1)[0]
          lines = [line[10:] if line.startswith('          ') else line for line in block.splitlines()]
          Path('/tmp/apply-v7.4.py').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          python /tmp/apply-v7.4.py

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate static output
        run: npm run generate

      - name: Firestore rules tests
        run: npm run test:rules

      - name: Commit verified V7.4 changes
        shell: bash
        run: |
          rm -f .github/workflows/apply-v7.4.yml .github/workflows/trigger-v7.4-pr.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: stabilize v7.4 print invoice and inventory"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
