name: Trigger printing scope patch

on:
  pull_request:
    branches:
      - dev
    types:
      - synchronize

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Extract and apply one-time patch
        shell: bash
        run: |
          sed -n '/^          from pathlib import Path$/,/^          PY$/p' .github/workflows/apply-printing-scope-once.yml \
            | sed 's/^          //' \
            | sed '$d' > /tmp/apply-printing-scope.py
          test -s /tmp/apply-printing-scope.py
          python /tmp/apply-printing-scope.py

      - name: Remove temporary workflows and push
        shell: bash
        run: |
          rm .github/workflows/apply-printing-scope-once.yml
          rm .github/workflows/kick-printing-scope.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(printing): scope records by creator and align print forms"
          git push origin HEAD:${{ github.head_ref }}
