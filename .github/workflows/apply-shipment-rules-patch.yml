name: Apply shipment rules patch

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  patch-rules:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/fix-order-payment-export-permissions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Replace shipment read scope
        shell: python
        run: |
          from pathlib import Path

          path = Path('firestore.rules')
          source = path.read_text(encoding='utf-8')
          start_marker = '    match /shipments/{docId} {'
          create_marker = "      allow create: if hasPerm('shipments.create')"
          start = source.index(start_marker)
          create = source.index(create_marker, start)
          new_read_block = '\n'.join([
            "    match /shipments/{docId} {",
            "      allow read: if hasPerm('shipments.view_all')",
            "        || (",
            "          hasAnyPerm([",
            "            'shipments.view',",
            "            'shipments.create',",
            "            'shipments.edit',",
            "            'shipments.delete'",
            "          ])",
            "          && (",
            "            hasPerm('orders.view_all')",
            "            || ownsOrderChildData(resource.data)",
            "            || (",
            "              resource.data.order_id is string",
            "              && ownsOrderById(resource.data.order_id)",
            "            )",
            "          )",
            "        );",
            "",
          ])
          path.write_text(source[:start] + new_read_block + source[create:], encoding='utf-8')
          marker = Path('.agent/shipment-rules-patched.txt')
          marker.parent.mkdir(parents=True, exist_ok=True)
          marker.write_text('shipment rules patch applied\n', encoding='utf-8')

      - name: Commit rules change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add firestore.rules
          git add -f .agent/shipment-rules-patched.txt
          git commit -m "align shipment firestore permissions"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
