name: Warehouse CI

on:
  workflow_dispatch:

  pull_request:
    branches:
      - dev
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  push:
    branches:
      - dev
      - main

permissions:
  contents: read

concurrency:
  group: warehouse-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, generate and rules tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
          run_install: false

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Prepare Nuxt
        run: pnpm exec nuxi prepare

      - name: Build
        run: pnpm run build

      - name: Generate static site
        run: pnpm run generate

      - name: Firestore Rules and concurrency tests
        run: pnpm run test:rules