name: Phase 1 npm bootstrap

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  normalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Normalize npm lockfile registry
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs')

          const lockPath = 'package-lock.json'
          const internalPrefix = 'https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/npm/npm-public/'
          const registryPrefix = 'https://registry.npmjs.org/'
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'))
          const lock = JSON.parse(fs.readFileSync(lockPath, 'utf8'))
          const versionsBefore = new Map(
            Object.entries(lock.packages || {}).map(([path, pkg]) => [path, pkg?.version || null]),
          )

          let replacements = 0
          for (const pkg of Object.values(lock.packages || {})) {
            if (typeof pkg?.resolved === 'string' && pkg.resolved.startsWith(internalPrefix)) {
              pkg.resolved = registryPrefix + pkg.resolved.slice(internalPrefix.length)
              replacements += 1
            }
          }

          lock.packages[''].engines = packageJson.engines
          fs.writeFileSync(lockPath, `${JSON.stringify(lock, null, 2)}\n`)

          const versionsAfter = new Map(
            Object.entries(lock.packages || {}).map(([path, pkg]) => [path, pkg?.version || null]),
          )
          for (const [path, version] of versionsBefore) {
            if (versionsAfter.get(path) !== version) {
              throw new Error(`Dependency version changed for ${path}`)
            }
          }

          console.log(`Normalized ${replacements} internal registry URLs`)
          NODE

      - name: Verify generated lockfile
        shell: bash
        run: |
          test "$(grep -c 'applied-caas-gateway1.internal.api.openai.org' package-lock.json || true)" = '0'
          git diff --check

      - name: Commit normalized lockfile
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json
          git commit -m 'chore(deps): normalize npm lockfile registry'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
