name: Apply Background Order Lock Reconciliation
# One-shot guarded runner; removed after successful verification.

on:
  pull_request:
    branches:
      - dev
    paths:
      - scripts/apply-background-order-lock-reconciliation.mjs
      - .github/workflows/apply-background-order-lock-reconciliation.yml

permissions:
  contents: write

concurrency:
  group: apply-background-order-lock-reconciliation-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v4
        with:
          ref: fix/background-order-lock-reconciliation
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Pin npm
        run: npm install --global npm@10.9.2 --no-audit --no-fund

      - name: Apply guarded source patch
        shell: bash
        run: |
          node scripts/apply-background-order-lock-reconciliation.mjs
          python3 - <<'PY'
          from pathlib import Path

          replacements = [
              (
                  Path('tests/order-printing-delete-lock.client.test.mjs'),
                  '/chưa được đồng bộ khóa tiến độ in/',
                  '/chưa hoàn tất đồng bộ khóa tiến độ in/',
              ),
              (
                  Path('tests/order-relations.client.test.mjs'),
                  '/chưa được đồng bộ khóa/',
                  '/chưa hoàn tất đồng bộ khóa/',
              ),
          ]
          for path, old, new in replacements:
              source = path.read_text(encoding='utf-8')
              if source.count(old) != 1:
                  raise SystemExit(f'{path}: expected exactly one {old!r}')
              path.write_text(source.replace(old, new), encoding='utf-8')
          PY

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund --silent

      - name: Prepare Nuxt
        run: npx --no-install nuxi prepare

      - name: Run focused rules and client regressions
        shell: bash
        run: |
          set -o pipefail
          {
            echo '### PRINTING RULES'
            npx --no-install firebase emulators:exec --only firestore "node --test --test-concurrency=1 tests/order-printing-delete-lock.rules.test.mjs"
            echo '### RELATION RULES'
            npx --no-install firebase emulators:exec --only firestore "node --test --test-concurrency=1 tests/order-relations.rules.test.mjs"
            echo '### PRINTING CLIENT'
            node --test tests/order-printing-delete-lock.client.test.mjs
            echo '### RELATION CLIENT'
            node --test tests/order-relations.client.test.mjs
          } 2>&1 | tee background-reconciliation-test.log

      - name: Commit focused failure diagnostics
        if: failure()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f background-reconciliation-test.log
          git commit -m "chore: capture background reconciliation test failure" || exit 0
          git push origin HEAD:fix/background-order-lock-reconciliation

      - name: Build application
        env:
          NUXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          NUXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.invalid
          NUXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
          NUXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder
          NUXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NUXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000000000'
          NUXT_PUBLIC_APP_NAME: KINGCUP CI
        run: npm run build

      - name: Commit verified background reconciliation
        shell: bash
        run: |
          rm -f background-reconciliation-test.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A firestore.rules pages/orders.vue pages/printing.vue composables/useAtomicOrderRelations.ts composables/usePrintingProgress.ts utils/orderRelationState.mjs utils/orderPrintingDeleteLock.mjs tests/order-printing-delete-lock.rules.test.mjs tests/order-printing-delete-lock.client.test.mjs tests/order-relations.client.test.mjs scripts/apply-background-order-lock-reconciliation.mjs .github/workflows/apply-background-order-lock-reconciliation.yml background-reconciliation-test.log
          git diff --cached --check
          git commit -m "fix: reconcile order locks automatically in background"
          git push origin HEAD:fix/background-order-lock-reconciliation
