name: Apply printing scope patch once

on:
  push:
    branches:
      - agent/warehouse-cost-allocation
    paths:
      - .github/workflows/apply-printing-scope-once.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/warehouse-cost-allocation
          fetch-depth: 0

      - name: Apply targeted changes
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected exactly one match, found {count}: {old[:100]!r}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'utils/orderPrintDocuments.ts',
              '''    .date-parts { display: grid; grid-template-columns: auto 1fr auto 1fr auto 1.35fr; align-items: baseline; column-gap: 2mm; white-space: nowrap; }
    .date-value { min-width: 9mm; text-align: center; border-bottom: 1px dotted #777; }''',
              '''    .date-parts { display: inline-grid; grid-template-columns: auto 8mm auto 8mm auto 13mm; align-items: baseline; column-gap: 1mm; white-space: nowrap; }
    .date-value { min-width: 0; text-align: center; border-bottom: 0; }''',
          )
          replace_once(
              'utils/orderPrintDocuments.ts',
              '    .packing-head { background: #fff; }',
              '    .packing-head { background: #b9d2f6; }',
          )

          replace_once(
              'constants/permissions.ts',
              '''  { key: 'printing.view', group: 'Tiến độ in ấn', name: 'Xem tiến độ in ấn' },
  { key: 'printing.create', group: 'Tiến độ in ấn', name: 'Thêm tiến độ in ấn' },
  { key: 'printing.edit', group: 'Tiến độ in ấn', name: 'Sửa tiến độ in ấn' },
  { key: 'printing.delete', group: 'Tiến độ in ấn', name: 'Xóa tiến độ in ấn' },''',
              '''  { key: 'printing.view', group: 'Tiến độ in ấn', name: 'Xem tiến độ in ấn của mình' },
  { key: 'printing.view_all', group: 'Tiến độ in ấn', name: 'Xem tất cả tiến độ in ấn' },
  { key: 'printing.create', group: 'Tiến độ in ấn', name: 'Thêm tiến độ in ấn' },
  { key: 'printing.edit', group: 'Tiến độ in ấn', name: 'Sửa tiến độ in ấn của mình' },
  { key: 'printing.delete', group: 'Tiến độ in ấn', name: 'Xóa tiến độ in ấn của mình' },''',
          )

          replace_once(
              'composables/useScopedQueries.ts',
              '''  async function loadPrintOrders(force = false) {
    if (!hasPermission('printing.view') && !hasPermission('*')) return []
    return sortNewest((await listCollection<PrintOrderDoc>('print_orders', [], {
      cacheKey: 'all', ttlMs: 20_000, force
    })).filter(isActive), 'created_at')
  }''',
              '''  async function loadPrintOrders(force = false) {
    if (canAll('printing.view_all')) {
      return sortNewest((await listCollection<PrintOrderDoc>('print_orders', [], {
        cacheKey: 'all', ttlMs: 20_000, force
      })).filter(isActive), 'created_at')
    }
    if (!hasPermission('printing.view')) return []
    return sortNewest(
      await listByEmailFields<PrintOrderDoc>('print_orders', ['created_by'], force, 20_000),
      'created_at'
    )
  }''',
          )
          replace_once(
              'composables/useScopedQueries.ts',
              '''  async function loadPrintOrderItems(force = false) {
    if (!hasPermission('printing.view') && !hasPermission('*')) return []
    return (await listCollection<PrintOrderItemDoc>('print_order_items', [], {
      cacheKey: 'all', ttlMs: 20_000, force
    })).filter(isActive)
  }''',
              '''  async function loadPrintOrderItems(force = false) {
    if (canAll('printing.view_all')) {
      return (await listCollection<PrintOrderItemDoc>('print_order_items', [], {
        cacheKey: 'all', ttlMs: 20_000, force
      })).filter(isActive)
    }
    if (!hasPermission('printing.view')) return []
    return (await listByEmailFields<PrintOrderItemDoc>(
      'print_order_items',
      ['created_by'],
      force,
      20_000
    )).filter(isActive)
  }''',
          )

          replace_once(
              'pages/printing.vue',
              'const { appUser, hasPermission } = useAuth()',
              'const { appUser, authReady, isAdmin, permissions, hasPermission } = useAuth()',
          )
          replace_once(
              'pages/printing.vue',
              '''const canCreate = computed(() => hasPermission('printing.create') || hasPermission('*'))
const canEdit = computed(() => hasPermission('printing.edit') || hasPermission('*'))
const canDelete = computed(() => hasPermission('printing.delete') || hasPermission('*'))''',
              '''const canViewAll = computed(() => hasPermission('printing.view_all') || hasPermission('*'))
const canCreate = computed(() => hasPermission('printing.create') || hasPermission('*'))
const canEdit = computed(() => hasPermission('printing.edit') || hasPermission('*'))
const canDelete = computed(() => hasPermission('printing.delete') || hasPermission('*'))
const currentEmail = computed(() => String(appUser.value?.email || '').trim().toLowerCase())

function ownsPrintOrder(order: PrintOrderDoc | null | undefined) {
  return Boolean(order && String(order.created_by || '').trim().toLowerCase() === currentEmail.value)
}

function canEditOrder(order: PrintOrderDoc | null | undefined) {
  return isAdmin.value || (canEdit.value && ownsPrintOrder(order))
}

function canDeleteOrder(order: PrintOrderDoc | null | undefined) {
  return isAdmin.value || (canDelete.value && ownsPrintOrder(order))
}''',
          )
          replace_once(
              'pages/printing.vue',
              'const enrichedRows = computed(() => rows.value.map(order => {',
              '''const visibleRows = computed(() => canViewAll.value
  ? rows.value
  : rows.value.filter(order => ownsPrintOrder(order)))

const enrichedRows = computed(() => visibleRows.value.map(order => {''',
          )
          replace_once(
              'pages/printing.vue',
              '''function openEditModal(order: PrintOrderDoc) {
  if (!canEdit.value) return showToast('Bạn không có quyền sửa tiến độ in ấn.', 'error')''',
              '''function openEditModal(order: PrintOrderDoc) {
  if (!canEditOrder(order)) return showToast('Bạn chỉ được sửa tiến độ in ấn do mình tạo.', 'error')''',
          )
          replace_once(
              'pages/printing.vue',
              '''  if (editing.value ? !canEdit.value : !canCreate.value) {
    return showToast('Bạn không có quyền thực hiện thao tác này.', 'error')
  }''',
              '''  if (editing.value ? !canEditOrder(editing.value) : !canCreate.value) {
    return showToast(editing.value
      ? 'Bạn chỉ được sửa tiến độ in ấn do mình tạo.'
      : 'Bạn không có quyền tạo tiến độ in ấn.', 'error')
  }''',
          )
          replace_once(
              'pages/printing.vue',
              '''async function removeOrder(order: PrintOrderDoc) {
  if (!canDelete.value) return showToast('Bạn không có quyền xóa tiến độ in ấn.', 'error')''',
              '''async function removeOrder(order: PrintOrderDoc) {
  if (!canDeleteOrder(order)) return showToast('Bạn chỉ được xóa tiến độ in ấn do mình tạo.', 'error')''',
          )
          replace_once(
              'pages/printing.vue',
              '''onMounted(() => {
  loadRows()
  statusTimer = setInterval(() => { statusTick.value = Date.now() }, 60_000)
})''',
              '''watch(
  () => `${authReady.value}|${appUser.value?.email || ''}|${permissions.value.slice().sort().join('|')}`,
  () => {
    if (!authReady.value || !appUser.value?.email) return
    void loadRows(true)
  },
  { immediate: true },
)

onMounted(() => {
  statusTimer = setInterval(() => { statusTick.value = Date.now() }, 60_000)
})''',
          )
          replace_once(
              'pages/printing.vue',
              '<PageHeader title="Tiến độ in ấn" subtitle="Theo dõi số lượng, thời hạn và tiến độ in theo từng sản phẩm hoặc logo">',
              '<PageHeader title="Tiến độ in ấn" :subtitle="canViewAll ? \'Theo dõi tất cả tiến độ in theo sản phẩm hoặc logo\' : \'Chỉ hiển thị tiến độ in do bạn tạo\'">',
          )
          replace_once(
              'pages/printing.vue',
              '<button v-if="canEdit" class="btn-sm" @click="openEditModal(row)">Sửa</button>',
              '<button v-if="canEditOrder(row)" class="btn-sm" @click="openEditModal(row)">Sửa</button>',
          )
          replace_once(
              'pages/printing.vue',
              '<button v-if="canDelete" class="btn-sm btn-delete" @click="removeOrder(row)">Xóa</button>',
              '<button v-if="canDeleteOrder(row)" class="btn-sm btn-delete" @click="removeOrder(row)">Xóa</button>',
          )

          replace_once(
              'firestore.rules',
              '''    function printOrderSourceMatches(data) {
      let orderId = data.get('order_id', '');
      let path = orderPath(orderId);
      return orderId is string
        && orderId != ''
        && exists(path)
        && orderDataIsActive(get(path).data)
        && data.get('order_code', '') == get(path).data.get('order_code', '');
    }''',
              '''    function printOrderSourceMatches(data) {
      let orderId = data.get('order_id', '');
      let path = orderPath(orderId);
      return orderId is string
        && orderId != ''
        && exists(path)
        && orderDataIsActive(get(path).data)
        && data.get('order_code', '') == get(path).data.get('order_code', '');
    }

    function printOrderPath(printOrderId) {
      return /databases/$(database)/documents/print_orders/$(printOrderId);
    }

    function ownsPrintOrderData(data) {
      return ownEmailField(data, 'created_by');
    }

    function ownsPrintOrderAfterById(printOrderId) {
      let path = printOrderPath(printOrderId);
      return printOrderId is string
        && printOrderId != ''
        && existsAfter(path)
        && ownsPrintOrderData(getAfter(path).data);
    }

    function ownsActivePrintOrderAfterById(printOrderId) {
      let path = printOrderPath(printOrderId);
      return ownsPrintOrderAfterById(printOrderId)
        && getAfter(path).data.get('deleted', false) != true
        && getAfter(path).data.get('active', true) != false;
    }''',
          )

          replace_once(
              'firestore.rules',
              '''    match /print_orders/{docId} {
      allow read: if hasPerm('printing.view');

      allow create: if hasPerm('printing.create')
        && request.resource.data.get('order_code', '') is string
        && request.resource.data.get('order_code', '') != ''
        && printOrderSourceMatches(request.resource.data)
        && ownEmailField(request.resource.data, 'created_by');

      allow update: if isAdmin()
        || (
          hasPerm('printing.edit')
          && warehouseDocIdentitySafe()
          && request.resource.data.get('order_code', '') is string
          && request.resource.data.get('order_code', '') != ''
          && printOrderSourceMatches(request.resource.data)
          && unchanged(['deleted', 'active', 'status', 'deleted_at', 'deleted_by'])
        )
        || (
          hasPerm('printing.delete')
          && warehouseDocIdentitySafe()
          && warehouseSoftDeleteOnly()
        );

      allow delete: if isAdmin();
    }

    match /print_order_items/{docId} {
      allow read: if hasPerm('printing.view');

      allow create: if hasAnyPerm(['printing.create', 'printing.edit'])
        && request.resource.data.print_order_id is string
        && request.resource.data.get('product_id', '') is string
        && request.resource.data.get('product_id', '') != ''
        && printQuantitiesAreValid(request.resource.data)
        && ownEmailField(request.resource.data, 'created_by');

      allow update: if isAdmin()
        || (
          hasPerm('printing.edit')
          && unchanged(['id', 'print_order_id', 'created_at', 'created_by', 'source'])
          && printQuantitiesAreValid(request.resource.data)
        )
        || (
          hasAnyPerm(['printing.edit', 'printing.delete'])
          && unchanged(['id', 'print_order_id', 'created_at', 'created_by', 'source'])
          && warehouseSoftDeleteOnly()
        );

      allow delete: if isAdmin();
    }''',
              '''    match /print_orders/{docId} {
      allow read: if hasPerm('printing.view_all')
        || (
          hasPerm('printing.view')
          && ownsPrintOrderData(resource.data)
        );

      allow create: if hasPerm('printing.create')
        && request.resource.data.get('order_code', '') is string
        && request.resource.data.get('order_code', '') != ''
        && printOrderSourceMatches(request.resource.data)
        && ownEmailField(request.resource.data, 'created_by');

      allow update: if isAdmin()
        || (
          hasPerm('printing.edit')
          && ownsPrintOrderData(resource.data)
          && warehouseDocIdentitySafe()
          && request.resource.data.get('order_code', '') is string
          && request.resource.data.get('order_code', '') != ''
          && printOrderSourceMatches(request.resource.data)
          && unchanged(['deleted', 'active', 'status', 'deleted_at', 'deleted_by'])
        )
        || (
          hasPerm('printing.delete')
          && ownsPrintOrderData(resource.data)
          && warehouseDocIdentitySafe()
          && warehouseSoftDeleteOnly()
        );

      allow delete: if isAdmin();
    }

    match /print_order_items/{docId} {
      allow read: if hasPerm('printing.view_all')
        || (
          hasPerm('printing.view')
          && ownEmailField(resource.data, 'created_by')
        );

      allow create: if hasAnyPerm(['printing.create', 'printing.edit'])
        && request.resource.data.print_order_id is string
        && ownsActivePrintOrderAfterById(request.resource.data.print_order_id)
        && request.resource.data.get('product_id', '') is string
        && request.resource.data.get('product_id', '') != ''
        && printQuantitiesAreValid(request.resource.data)
        && ownEmailField(request.resource.data, 'created_by');

      allow update: if isAdmin()
        || (
          hasPerm('printing.edit')
          && ownEmailField(resource.data, 'created_by')
          && ownsActivePrintOrderAfterById(resource.data.print_order_id)
          && unchanged(['id', 'print_order_id', 'created_at', 'created_by', 'source'])
          && printQuantitiesAreValid(request.resource.data)
        )
        || (
          hasAnyPerm(['printing.edit', 'printing.delete'])
          && ownEmailField(resource.data, 'created_by')
          && ownsPrintOrderAfterById(resource.data.print_order_id)
          && unchanged(['id', 'print_order_id', 'created_at', 'created_by', 'source'])
          && warehouseSoftDeleteOnly()
        );

      allow delete: if isAdmin();
    }''',
          )

          replace_once(
              'tests/firestore.rules.test.mjs',
              "permissions_flat: ['page.printing', 'printing.view']",
              "permissions_flat: ['page.printing', 'printing.view', 'printing.view_all']",
          )
          PY

      - name: Commit patch and remove one-time workflow
        shell: bash
        run: |
          rm .github/workflows/apply-printing-scope-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(printing): scope records by creator and align print forms"
          git push origin HEAD:agent/warehouse-cost-allocation
