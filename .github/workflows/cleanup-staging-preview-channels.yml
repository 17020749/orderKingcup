name: Cleanup staging preview channels

on:
  pull_request:
    branches: [dev]
    types: [synchronize]

permissions:
  contents: read

jobs:
  cleanup-preview-channels:
    if: github.head_ref == 'agent/bus-request-fix'
    runs-on: ubuntu-latest
    environment:
      name: dev
    env:
      FIREBASE_PROJECT_ID: kingcupmanagerstaging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      - name: List preview channels
        run: npx --yes firebase-tools@15.23.0 hosting:channel:list --project "$FIREBASE_PROJECT_ID" --json > channels.json
      - name: Remove previews for closed pull requests
        shell: bash
        run: |
          node <<'NODE' > channels-to-delete.txt
          const fs = require('node:fs')
          const payload = JSON.parse(fs.readFileSync('channels.json', 'utf8'))
          const result = payload.result ?? payload
          const channels = Array.isArray(result)
            ? result
            : Array.isArray(result.channels)
              ? result.channels
              : []
          const closedPrPattern = /^pr(?:74|76|77|79|81)(?:-|$)/
          const now = Date.now()
          const selected = channels
            .map((channel) => ({
              id: String(channel.name || channel.id || '').split('/').pop(),
              expireTime: channel.expireTime || channel.expire_time || '',
            }))
            .filter(({ id, expireTime }) => (
              id && id !== 'live' && (
                closedPrPattern.test(id)
                || (expireTime && new Date(expireTime).getTime() <= now)
              )
            ))
          console.error(`Found ${channels.length} Hosting channels; deleting ${selected.length} closed/expired previews.`)
          for (const channel of selected) console.log(channel.id)
          NODE

          while IFS= read -r channel_id; do
            [ -z "$channel_id" ] && continue
            echo "Deleting preview channel: $channel_id"
            npx --yes firebase-tools@15.23.0 hosting:channel:delete "$channel_id" \
              --project "$FIREBASE_PROJECT_ID" \
              --force \
              --non-interactive
          done < channels-to-delete.txt
