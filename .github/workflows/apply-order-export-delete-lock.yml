name: Apply order export delete lock patch

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/fix-order-export-delete-lock'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1

      - name: Patch order delete flow
        shell: python
        run: |
          from pathlib import Path

          page = Path('pages/orders.vue')
          source = page.read_text(encoding='utf-8')
          old_import = """// @ts-ignore Shared ESM helper is executed directly by Node client tests.
          import { orderRelationDeleteBlocker } from '~/utils/orderRelationState.mjs'
          // @ts-ignore Shared ESM helper is executed directly by Node client tests.
          import { validateOrderItemEdit } from '~/utils/orderItemDependencies.mjs'"""
          new_import = """// @ts-ignore Shared ESM helper is executed directly by Node client tests.
          import { orderRelationDeleteBlocker } from '~/utils/orderRelationState.mjs'
          // @ts-ignore Shared ESM helper is executed directly by Node client tests.
          import {
            warehouseOrderDeleteBlocker,
            warehouseRequestsForDeleteCascade,
          } from '~/utils/orderWarehouseDeleteLock.mjs'
          // @ts-ignore Shared ESM helper is executed directly by Node client tests.
          import { validateOrderItemEdit } from '~/utils/orderItemDependencies.mjs'"""
          if old_import not in source:
            raise SystemExit('orders import marker not found')
          source = source.replace(old_import, new_import, 1)

          old_blocker = """function orderHasWarehouseExport(row: OrderDoc) {
            const requests = exportRequests.value.filter(request => request.order_id === row.id && isActive(request))
            const progress = buildFulfillmentRows(itemsByOrder.value[row.id] || [], requests)
            const exportedByQuantity = progress.some(line => toNumber(line.exported_qty) > 0)
            const exportedByRequest = requests.some(request => {
              const status = normalizeText(request.status).replace(/\\s+/g, '_')
              return ['da_xuat', 'da_xuat_kho', 'da_xuat_du', 'exported', 'completed', 'hoan_thanh'].includes(status)
                || !!String(request.warehouse_export_code || '').trim()
            })
            return exportedByQuantity || exportedByRequest
          }

          function orderDeleteBlocker(row: OrderDoc) {
            if (orderHasWarehouseExport(row)) {
              return 'Đơn hàng đã có số lượng xuất kho hoặc mã phiếu Warehouse nên không thể xóa.'
            }
            const printingBlocker = printingDeleteBlocker(row, printingProgress.value)
            if (printingBlocker) return printingBlocker
            return orderRelationDeleteBlocker(row)
          }"""
          new_blocker = """function orderDeleteBlocker(
            row: OrderDoc,
            requests = exportRequests.value.filter(request => request.order_id === row.id && isActive(request)),
          ) {
            const warehouseBlocker = warehouseOrderDeleteBlocker(row, requests)
            if (warehouseBlocker) return warehouseBlocker
            const printingBlocker = printingDeleteBlocker(row, printingProgress.value)
            if (printingBlocker) return printingBlocker
            return orderRelationDeleteBlocker(row)
          }"""
          if old_blocker not in source:
            raise SystemExit('orders blocker marker not found')
          source = source.replace(old_blocker, new_blocker, 1)

          old_delete = """async function softDeleteOrder(row: OrderDoc) {
            if (!hasPermission('orders.delete')) return showToast('Bạn không có quyền xóa đơn hàng.', 'error')
            const initialBlocker = orderDeleteBlocker(row)
            if (initialBlocker) return showToast(initialBlocker, 'error')
            const confirmed = await askConfirm({
              title: 'Xóa đơn hàng',
              message: `Bạn chắc chắn muốn xóa đơn hàng ${row.order_code}?\\nCác dòng sản phẩm và phiếu xuất chưa thực hiện của đơn này cũng sẽ được xóa mềm.`,
              confirmLabel: 'Xóa đơn'
            })
            if (!confirmed) return

            await withLoading(async () => {
              const orderItems = itemsByOrder.value[row.id] || []
              const orderRequests = exportRequests.value.filter(request => request.order_id === row.id && isActive(request))
              if (orderHasWarehouseExport(row)) {
                throw new Error('Đơn hàng đã có số lượng xuất kho hoặc mã phiếu Warehouse nên không thể xóa.')
              }
              const latestPrintingProgress = await loadPrintingProgressForOrder(row.id)
              const latestPrintingBlocker = printingDeleteBlocker(row, latestPrintingProgress)
              if (latestPrintingBlocker) throw new Error(latestPrintingBlocker)
              const latestOrderSnap = await getDoc(doc(db, 'orders', row.id))
              if (!latestOrderSnap.exists()) throw new Error('Không tìm thấy đơn hàng cần xóa.')
              const latestRelationBlocker = orderRelationDeleteBlocker({ ...latestOrderSnap.data(), id: latestOrderSnap.id })
              if (latestRelationBlocker) throw new Error(latestRelationBlocker)

              if (orderItems.length + orderRequests.length + 2 > 500) {"""
          new_delete = """async function softDeleteOrder(row: OrderDoc) {
            if (!hasPermission('orders.delete')) return showToast('Bạn không có quyền xóa đơn hàng.', 'error')
            const initialBlocker = orderDeleteBlocker(row)
            if (initialBlocker) return showToast(initialBlocker, 'error')

            let latestOrder = row
            let latestRequests: any[] = []
            try {
              const [latestOrderSnap, loadedRequests] = await Promise.all([
                getDoc(doc(db, 'orders', row.id)),
                loadScopedExportRequests([row], true),
              ])
              if (!latestOrderSnap.exists()) throw new Error('Không tìm thấy đơn hàng cần xóa.')
              latestOrder = { ...latestOrderSnap.data(), id: latestOrderSnap.id } as OrderDoc
              latestRequests = loadedRequests.filter(request => request.order_id === row.id && isActive(request))
            } catch (error) {
              return showToast(reportFirebaseError(error, 'Không kiểm tra được trạng thái yêu cầu xuất kho của đơn.'), 'error')
            }

            const latestBlocker = orderDeleteBlocker(latestOrder, latestRequests)
            if (latestBlocker) return showToast(latestBlocker, 'error')

            const confirmed = await askConfirm({
              title: 'Xóa đơn hàng',
              message: `Bạn chắc chắn muốn xóa đơn hàng ${row.order_code}?\\nCác dòng sản phẩm và yêu cầu xuất kho đang chờ hoặc đã từ chối cũng sẽ được xóa mềm.`,
              confirmLabel: 'Xóa đơn'
            })
            if (!confirmed) return

            await withLoading(async () => {
              const orderItems = itemsByOrder.value[row.id] || []
              const orderRequests = warehouseRequestsForDeleteCascade(latestRequests)
              const warehouseBlocker = warehouseOrderDeleteBlocker(latestOrder, latestRequests)
              if (warehouseBlocker) throw new Error(warehouseBlocker)
              const latestPrintingProgress = await loadPrintingProgressForOrder(row.id)
              const latestPrintingBlocker = printingDeleteBlocker(latestOrder, latestPrintingProgress)
              if (latestPrintingBlocker) throw new Error(latestPrintingBlocker)
              const latestRelationBlocker = orderRelationDeleteBlocker(latestOrder)
              if (latestRelationBlocker) throw new Error(latestRelationBlocker)

              if (orderItems.length + orderRequests.length + 2 > 500) {"""
          if old_delete not in source:
            raise SystemExit('orders delete marker not found')
          source = source.replace(old_delete, new_delete, 1)
          page.write_text(source, encoding='utf-8')

          scoped = Path('composables/useScopedQueries.ts')
          source = scoped.read_text(encoding='utf-8')
          old_guard = "if (!hasPermission('export_requests.view') && !hasPermission('orders.warehouse_export') && !hasPermission('orders.edit'))"
          new_guard = "if (!hasPermission('export_requests.view') && !hasPermission('orders.warehouse_export') && !hasPermission('orders.edit') && !hasPermission('orders.delete'))"
          count = source.count(old_guard)
          if count != 2:
            raise SystemExit(f'expected 2 scoped query guards, found {count}')
          scoped.write_text(source.replace(old_guard, new_guard), encoding='utf-8')

          rules = Path('firestore.rules')
          source = rules.read_text(encoding='utf-8')
          old_order_delete = """    function orderCanBeDeleted() {
                return fulfillmentStatus() != 'da_xuat_1_phan'
                  && fulfillmentStatus() != 'da_xuat_du'
                  && printingLockReadyData(resource.data)"""
          new_order_delete = """    function orderCanBeDeleted() {
                return fulfillmentStatus() != 'da_xuat_1_phan'
                  && fulfillmentStatus() != 'da_xuat_du'
                  && resource.data.get('warehouse_request_status', '') != 'da_tiep_nhan'
                  && resource.data.get('warehouse_request_status', '') != 'cho_xuat_kho'
                  && resource.data.get('warehouse_request_status', '') != 'da_xuat'
                  && printingLockReadyData(resource.data)"""
          if old_order_delete not in source:
            raise SystemExit('orderCanBeDeleted marker not found')
          source = source.replace(old_order_delete, new_order_delete, 1)

          old_request_delete = """    function exportRequestCanBeDeleted() {
                return resource.data.get('status', '') in ['cho_xu_ly', 'dang_xu_ly', 'pending']
                  && resource.data.get('warehouse_export_code', '') == '';
              }"""
          new_request_delete = """    function exportRequestCanBeDeleted() {
                return resource.data.get('status', '') in [
                    'cho_xu_ly', 'dang_xu_ly', 'pending', 'processing', 'tu_choi', 'rejected'
                  ]
                  && resource.data.get('warehouse_export_code', '') == ''
                  && resource.data.get('active_export_order_id', '') == ''
                  && resource.data.get('export_order_id', '') == ''
                  && resource.data.get('warehouse_export_order_id', '') == ''
                  && resource.data.get('warehouse_export_id', '') == '';
              }"""
          if old_request_delete not in source:
            raise SystemExit('exportRequestCanBeDeleted marker not found')
          source = source.replace(old_request_delete, new_request_delete, 1)

          old_read = "hasAnyPerm(['export_requests.view', 'orders.warehouse_export', 'orders.edit'])"
          new_read = "hasAnyPerm(['export_requests.view', 'orders.warehouse_export', 'orders.edit', 'orders.delete'])"
          if source.count(old_read) != 1:
            raise SystemExit('export request read marker not found exactly once')
          rules.write_text(source.replace(old_read, new_read, 1), encoding='utf-8')

      - name: Commit patched files through Contents API
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          for path in pages/orders.vue composables/useScopedQueries.ts firestore.rules; do
            current_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/${path}?ref=${TARGET_BRANCH}" --jq .sha)"
            encoded="$(base64 -w0 "${path}")"
            jq -n \
              --arg message "fix order export delete lock in ${path}" \
              --arg content "${encoded}" \
              --arg sha "${current_sha}" \
              --arg branch "${TARGET_BRANCH}" \
              '{message:$message, content:$content, sha:$sha, branch:$branch}' > /tmp/update.json
            gh api --method PUT "repos/${GITHUB_REPOSITORY}/contents/${path}" --input /tmp/update.json
          done
