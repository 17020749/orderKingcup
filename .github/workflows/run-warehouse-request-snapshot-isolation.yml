name: Run warehouse request snapshot isolation

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/warehouse-request-snapshot-isolation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
      - name: Extract and apply guarded patch
        shell: bash
        run: |
          rm -f PATCH_ERROR.txt TEST_ERROR.txt
          awk '/cat > \/tmp\/patch.b64/{copy=1; next} /^PATCH$/{copy=0} copy' .github/workflows/apply-warehouse-request-snapshot-isolation.yml > /tmp/patch.b64
          base64 -d /tmp/patch.b64 | gunzip > /tmp/apply-patch.mjs
          python <<'PY'
          from pathlib import Path
          path = Path('/tmp/apply-patch.mjs')
          source = path.read_text()
          source = source.replace(
              "replaceOnce('firestore.rules', `           'order_code',\\n           'customer_name',\\n           'export_date',`, `           'order_code',\\n           'customer_name',\\n           'customer_id',",
              "replaceOnce('firestore.rules', `          'order_code',\\n          'customer_name',\\n          'export_date',`, `          'order_code',\\n          'customer_name',\\n          'customer_id',",
          )
          source = source.replace(
              "           'receiver_name',\\n           'receiver_phone',\\n           'receiver_address',\\n           'request_snapshot_version',\\n           'source_items',\\n           'export_date',`)",
              "          'receiver_name',\\n          'receiver_phone',\\n          'receiver_address',\\n          'request_snapshot_version',\\n          'source_items',\\n          'export_date',`)",
          )
          path.write_text(source)
          PY
          set +e
          node /tmp/apply-patch.mjs > /tmp/patch.log 2>&1
          status=$?
          cat /tmp/patch.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/patch.log PATCH_ERROR.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add PATCH_ERROR.txt
            git commit -m "Record snapshot isolation patch failure" || true
            git push origin HEAD:agent/warehouse-request-snapshot-isolation || true
            exit "$status"
          fi

          cat > tests/warehouse-print-menu.static.test.mjs <<'TEST'
          import assert from 'node:assert/strict'
          import { readFileSync } from 'node:fs'
          import { test } from 'node:test'

          test('warehouse request page prints entirely from request snapshots', () => {
            const page = readFileSync('pages/warehouse-export-requests.vue', 'utf8')
            assert.ok(page.includes('<WarehousePrintMenu'))
            assert.ok(page.includes(':request="row"'))
            assert.ok(!page.includes(':order="orders.find'))
            assert.ok(!page.includes('loadScopedOrders'))
            assert.ok(!page.includes('loadScopedOrderItems'))
            assert.ok(!page.includes('itemsByOrder'))
          })

          test('warehouse print menu has three choices without order or customer reads', () => {
            const component = readFileSync('components/WarehousePrintMenu.vue', 'utf8')
            for (const label of ['Phiếu xuất kho', 'Tem gửi bưu điện', 'Tem gửi nhà xe']) {
              assert.ok(component.includes(label))
            }
            assert.ok(component.includes('tu_choi'))
            assert.ok(component.includes('requestLineProgress'))
            assert.ok(component.includes('export.print'))
            assert.ok(component.includes('bus_transport.view'))
            assert.ok(!component.includes("collection(db, 'orders')"))
            assert.ok(!component.includes("doc(db, 'customers'"))
            assert.ok(!component.includes('props.order'))
          })

          test('request and parcel print modals use snapshot recipient data only', () => {
            const requestModal = readFileSync('components/ExportRequestPrintModal.vue', 'utf8')
            const parcelModal = readFileSync('components/ParcelLabelPrintModal.vue', 'utf8')
            const documentBuilder = readFileSync('utils/parcelLabelPrintDocuments.ts', 'utf8')
            assert.ok(requestModal.includes('receiver_name'))
            assert.ok(requestModal.includes('receiver_phone'))
            assert.ok(requestModal.includes('receiver_address'))
            assert.ok(!requestModal.includes("getOne('customers'"))
            assert.ok(!requestModal.includes('OrderDoc'))
            assert.ok(parcelModal.includes('request?.receiver_name'))
            assert.ok(parcelModal.includes('request?.receiver_phone'))
            assert.ok(parcelModal.includes('request?.receiver_address'))
            assert.ok(!parcelModal.includes('CustomerDoc'))
            assert.ok(!parcelModal.includes('OrderDoc'))
            assert.ok(documentBuilder.includes('class="center package-cell">&nbsp;</td>'))
          })
          TEST

          cat > tests/bus-transport-followup.static.test.mjs <<'TEST'
          import assert from 'node:assert/strict'
          import { readFileSync } from 'node:fs'
          import { test } from 'node:test'

          function matchBlock(source, start, end) {
            const from = source.indexOf(start)
            assert.notEqual(from, -1, `Missing block start: ${start}`)
            const to = source.indexOf(end, from)
            assert.notEqual(to, -1, `Missing block end: ${end}`)
            return source.slice(from, to)
          }

          test('bus transport uses request snapshots and never queries orders or customers', () => {
            const page = readFileSync('pages/bus-transport.vue', 'utf8')
            assert.ok(page.includes("collection(db, 'order_export_requests')"))
            assert.ok(page.includes('isRejectedRequest'))
            assert.ok(page.includes('source_request_id'))
            assert.ok(page.includes('receiver_phone'))
            assert.ok(page.includes('receiver_address'))
            assert.ok(!page.includes("collection(db, 'orders')"))
            assert.ok(!page.includes("doc(db, 'customers'"))
            assert.ok(!page.includes('customerCache'))
          })

          test('warehouse UI does not receive order read permission through rules', () => {
            const rules = readFileSync('firestore.rules', 'utf8')
            const customerBlock = matchBlock(rules, 'match /customers/{docId}', 'match /customer_codes/{customerCode}')
            const orderBlock = matchBlock(rules, 'match /orders/{docId}', 'match /order_items/{docId}')
            assert.ok(!customerBlock.includes("'export.print'"))
            assert.ok(!customerBlock.includes("'bus_transport.view'"))
            assert.ok(!orderBlock.includes("hasPerm('bus_transport.view')"))
            assert.ok(rules.includes('requestSnapshotAllowsExportItem'))
            assert.ok(rules.includes("sourceItem.get('order_id', '') == request.resource.data.get('source_order_id', '')"))
            assert.ok(rules.includes("request.resource.data.get('quantity', 0) <= sourceItem.get('quantity', 0)"))
          })

          test('permission catalog remains unchanged and has no warehouse order dependency', () => {
            const access = readFileSync('constants/accessMatrix.mjs', 'utf8')
            assert.ok(access.includes("'page.bus_transport': ['bus_transport.view']"))
            assert.ok(access.includes("'bus_transport.view': ['page.bus_transport']"))
            assert.ok(!access.includes("'bus_transport.view': ['page.bus_transport', 'orders.view"))
            assert.ok(!access.includes("'export_requests.release': ['page.warehouse_export_requests', 'inventory.view', 'export.view', 'orders.view"))
          })
          TEST
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Prepare and build
        run: |
          npx --no-install nuxi prepare
          npm run build
      - name: Run focused isolation tests
        shell: bash
        run: |
          set +e
          node --test tests/warehouse-print-menu.static.test.mjs tests/bus-transport-followup.static.test.mjs > /tmp/test.log 2>&1
          status=$?
          cat /tmp/test.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/test.log TEST_ERROR.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add TEST_ERROR.txt
            git commit -m "Record snapshot isolation test failure" || true
            git push origin HEAD:agent/warehouse-request-snapshot-isolation || true
            exit "$status"
          fi
          rm -f TEST_ERROR.txt
      - name: Commit changes and remove temporary workflows
        shell: bash
        run: |
          rm -f PATCH_ERROR.txt TEST_ERROR.txt
          rm -f .github/workflows/apply-warehouse-request-snapshot-isolation.yml
          rm -f .github/workflows/run-warehouse-request-snapshot-isolation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Isolate warehouse requests from order reads"
          git push origin HEAD:agent/warehouse-request-snapshot-isolation
