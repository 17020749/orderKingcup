name: Warehouse CI

on:
  pull_request:
    branches:
      - dev
    types:
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: printing-rules-patch-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply_printing_rules_once:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Enforce printing ownership in Firestore Rules
        shell: bash
        env:
          RULES_BLOCK_B64: IC...REPLACE
        run: |
          python <<'PY'
          import base64
          import os
          from pathlib import Path
          path = Path('firestore.rules')
          text = path.read_text(encoding='utf-8')
          start = text.index('    match /print_orders/{docId} {')
          end = text.index('    match /shipments/{docId} {', start)
          replacement = base64.b64decode(os.environ['RULES_BLOCK_B64']).decode('utf-8')
          path.write_text(text[:start] + replacement + text[end:], encoding='utf-8')
          PY

      - name: Restore CI, remove temporary workflows and push
        shell: bash
        run: |
          git fetch origin dev
          git checkout origin/dev -- .github/workflows/warehouse-ci.yml
          rm -f .github/workflows/fix-printing-rules-once.yml
          rm -f .github/workflows/kick-printing-scope.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(rules): enforce printing record ownership"
          git push origin HEAD:${{ github.head_ref }}
