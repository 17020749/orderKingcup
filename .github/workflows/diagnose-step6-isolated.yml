name: Diagnose Step 6 Isolated

on:
  push:
    branches:
      - agent/step-6-printing-delete-lock
    paths:
      - .github/workflows/diagnose-step6-isolated.yml

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step-6-printing-delete-lock
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
      - uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Run isolated tests
        shell: bash
        run: |
          set +e
          pnpm exec firebase emulators:exec --only firestore "node --test --test-concurrency=1 tests/order-printing-delete-lock.client.test.mjs tests/order-printing-delete-lock.rules.test.mjs tests/printing-owner.rules.test.mjs" > step6-isolated.log 2>&1
          echo "EXIT_CODE=$?" >> step6-isolated.log
          exit 0
      - name: Comment output
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '## Step 6 isolated diagnostic'
            echo
            echo '```text'
            cat step6-isolated.log
            echo '```'
          } > comment.md
          gh pr comment 29 --repo 17020749/orderKingcup --body-file comment.md
