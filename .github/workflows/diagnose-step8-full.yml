name: Diagnose Step 8 Full Suite

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/step-8-export-lifecycle'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step-8-export-lifecycle
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
      - uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Run full suite
        id: tests
        continue-on-error: true
        run: pnpm run test:rules > step8-full-suite.log 2>&1
      - name: Persist concise result
        run: |
          {
            grep -n -B 3 -A 22 "not ok" step8-full-suite.log || true
            echo "--- SUMMARY ---"
            tail -n 40 step8-full-suite.log
          } > step8-full-diagnose.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add step8-full-diagnose.txt
          git commit -m "chore(step8): record full regression results" || true
          git push origin HEAD:agent/step-8-export-lifecycle
