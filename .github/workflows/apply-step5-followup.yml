name: Apply Step 5 Follow-up

on:
  push:
    branches:
      - agent/step-5-atomic-order-save
    paths:
      - scripts/apply-step5-followup.mjs
      - .github/workflows/apply-step5-followup.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/step-5-atomic-order-save
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.4

      - name: Apply follow-up patch
        run: node scripts/apply-step5-followup.mjs

      - name: Commit patched test
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/order-atomic-save.rules.test.mjs scripts/apply-step5-followup.mjs .github/workflows/apply-step5-followup.yml
          git commit -m "test(orders): fix atomic create rollback setup"
          git push origin HEAD:agent/step-5-atomic-order-save
