name: Apply Step 7 Relation Patches

on:
  push:
    branches:
      - agent/step-7-atomic-finance-shipping
    paths:
      - .github/workflows/apply-step7-relations.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step-7-atomic-finance-shipping
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply patches
        run: python scripts/apply-step7-relations.py
      - name: Commit patched source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm scripts/apply-step7-relations.py .github/workflows/apply-step7-relations.yml
          git add firestore.rules pages/orders.vue types/models.ts
          git commit -m "feat(step7): enforce atomic order relation consistency"
          git push origin HEAD:agent/step-7-atomic-finance-shipping
