name: Apply Cancel Warehouse Fix

on:
  push:
    branches:
      - fix/runtime-export-and-sync-locks

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/runtime-export-and-sync-locks
          fetch-depth: 0
          show-progress: false
      - name: Apply source repair
        run: python3 scripts/fix-cancel-warehouse-source.py
      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add composables/useWarehouseCostTransactions.ts tests/runtime-export-sync.client.test.mjs
          git commit -m "fix(warehouse): resolve cancellation warehouse from export item"
          git push origin HEAD:fix/runtime-export-and-sync-locks
