name: Run printing line supplier patch

on:
  push:
    branches:
      - agent/printing-line-suppliers
    paths:
      - .github/workflows/run-printing-line-suppliers.yml
  pull_request:
    branches:
      - dev
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'push' || github.event.pull_request.head.ref == 'agent/printing-line-suppliers'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/printing-line-suppliers
          fetch-depth: 0

      - name: Extract and apply guarded patch
        shell: bash
        run: |
          awk '/python <<'\''PY'\''/{copy=1; next} /^          PY$/{copy=0} copy { sub(/^          /, ""); print }' .github/workflows/apply-printing-line-suppliers.yml > /tmp/apply.py
          python /tmp/apply.py

      - name: Commit intended files and remove temporary workflows
        shell: bash
        run: |
          rm -f .github/workflows/apply-printing-line-suppliers.yml
          rm -f .github/workflows/run-printing-line-suppliers.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pages/printing.vue composables/usePrintingProgress.ts types/models.ts tests/printing-line-suppliers.static.test.mjs package.json .github/workflows/apply-printing-line-suppliers.yml .github/workflows/run-printing-line-suppliers.yml
          git commit -m "Move printing suppliers to item lines"
          git push origin HEAD:agent/printing-line-suppliers
