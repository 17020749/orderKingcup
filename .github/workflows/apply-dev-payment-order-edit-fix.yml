name: Apply Dev Payment Order Edit Fix

on:
  pull_request:
    branches:
      - dev
    paths:
      - scripts/apply-dev-payment-order-edit-fix.mjs
      - .github/workflows/apply-dev-payment-order-edit-fix.yml

permissions:
  contents: write

concurrency:
  group: apply-dev-payment-order-edit-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v4
        with:
          ref: fix/dev-payment-order-edit-runtime
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Pin npm
        run: npm install --global npm@10.9.2 --no-audit --no-fund

      - name: Apply guarded patch
        run: node scripts/apply-dev-payment-order-edit-fix.mjs

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund --silent

      - name: Prepare Nuxt
        run: npx --no-install nuxi prepare

      - name: Run focused regressions
        run: |
          npx --no-install firebase emulators:exec --only firestore "node --test --test-concurrency=1 tests/order-relations.rules.test.mjs"
          node --test tests/order-relations.client.test.mjs

      - name: Build application
        env:
          NUXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          NUXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.invalid
          NUXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
          NUXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder
          NUXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NUXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000000000'
          NUXT_PUBLIC_APP_NAME: KINGCUP CI
        run: npm run build

      - name: Commit verified fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add -A firestore.rules pages/orders.vue composables/useScopedQueries.ts tests/order-relations.rules.test.mjs tests/order-relations.client.test.mjs scripts/apply-dev-payment-order-edit-fix.mjs .github/workflows/apply-dev-payment-order-edit-fix.yml
          git diff --cached --check
          git commit -m "fix: restore non-admin payments and order editing"
          git push origin HEAD:fix/dev-payment-order-edit-runtime
