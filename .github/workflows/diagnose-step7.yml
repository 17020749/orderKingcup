name: Diagnose Step 7 Full Suite

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/step-7-atomic-finance-shipping'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step-7-atomic-finance-shipping
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
      - uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Run full test suite
        id: tests
        continue-on-error: true
        run: pnpm run test:rules > step7-full.log 2>&1
      - name: Persist concise result
        run: |
          {
            grep -n -B 3 -A 20 "not ok" step7-full.log || true
            echo "--- SUMMARY ---"
            tail -n 35 step7-full.log
          } > step7-diagnose.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add step7-diagnose.txt
          git commit -m "chore(step7): record full suite regressions" || true
          git push origin HEAD:agent/step-7-atomic-finance-shipping
