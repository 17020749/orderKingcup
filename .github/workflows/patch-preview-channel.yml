name: Patch preview channel

on:
  pull_request:
    branches: [dev]
    types: [synchronize]

permissions:
  contents: write

jobs:
  patch-preview-channel:
    if: github.head_ref == 'agent/bus-request-fix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/patch-preview-channel.mjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "use stable PR hosting channel ids"
          git push origin "HEAD:${{ github.head_ref }}"
