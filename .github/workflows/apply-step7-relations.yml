name: Apply Step 7 Relation Patches

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/step-7-atomic-finance-shipping'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step-7-atomic-finance-shipping
          fetch-depth: 0
          show-progress: false
      - name: Check patch state
        id: state
        run: |
          if grep -q "function orderPaymentSummaryUpdateAllowed" firestore.rules; then
            echo "applied=true" >> "$GITHUB_OUTPUT"
          else
            echo "applied=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Fix patcher
        if: steps.state.outputs.applied == 'false'
        run: python3 scripts/fix-step7-patcher.py
      - name: Apply patches
        if: steps.state.outputs.applied == 'false'
        run: python3 scripts/apply-step7-relations.py
      - name: Commit patched source
        if: steps.state.outputs.applied == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add firestore.rules pages/orders.vue types/models.ts
          git commit -m "feat(step7): enforce atomic order relation consistency"
          git push origin HEAD:agent/step-7-atomic-finance-shipping
