name: Phase 5 Cleanup

on:
  push:
    branches:
      - security/phase-5-activity-notifications
    paths:
      - .github/workflows/phase5-cleanup.yml

permissions:
  contents: write

jobs:
  restore-generated-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Phase 5 branch
        uses: actions/checkout@v4
        with:
          ref: security/phase-5-activity-notifications
          fetch-depth: 0

      - name: Restore tracked generated directories exactly from dev
        run: |
          git fetch origin dev
          git rm -r --ignore-unmatch .nuxt .output
          git checkout origin/dev -- .nuxt .output
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated artifact changes to restore."
            exit 0
          fi
          git commit -m "chore: remove generated Phase 5 artifacts"
          git push origin HEAD:security/phase-5-activity-notifications
