name: Diagnose Step 7 Relations

on:
  push:
    branches:
      - agent/step-7-atomic-finance-shipping
    paths:
      - .github/workflows/diagnose-step7.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step-7-atomic-finance-shipping
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
      - uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: pnpm install --frozen-lockfile
      - name: Run isolated tests
        id: tests
        continue-on-error: true
        run: |
          pnpm exec firebase emulators:exec --only firestore "node --test --test-concurrency=1 tests/order-relations.client.test.mjs tests/order-relations.rules.test.mjs" > step7-full.log 2>&1
      - name: Persist concise result
        run: |
          {
            grep -n -B 3 -A 18 "not ok" step7-full.log || true
            echo "--- SUMMARY ---"
            tail -n 30 step7-full.log
          } > step7-diagnose.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add step7-diagnose.txt
          git commit -m "chore(step7): record isolated test result" || true
          git push origin HEAD:agent/step-7-atomic-finance-shipping
