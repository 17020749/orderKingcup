name: Fix Step 6 Rules Budget

on:
  push:
    branches:
      - agent/step-6-printing-delete-lock
    paths:
      - .github/workflows/fix-step6-rules-budget.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: agent/step-6-printing-delete-lock
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'

      - name: Apply rules and test patch
        run: node scripts/fix-step6-rules-budget.mjs

      - name: Commit patched files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(printing): keep atomic lock within rules budget"
          git push origin HEAD:agent/step-6-printing-delete-lock
