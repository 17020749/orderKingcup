name: Diagnose Step 6 Full Failures

on:
  push:
    branches:
      - agent/step-6-printing-delete-lock
    paths:
      - .github/workflows/diagnose-step6-full-failures.yml

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step-6-printing-delete-lock
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
      - uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Run full suite and extract failures
        shell: bash
        run: |
          set +e
          pnpm run test:rules > full.log 2>&1
          code=$?
          grep -n -B 4 -A 18 -E '^not ok|# fail [1-9]|failureType:|location:' full.log > failures.log || true
          echo "EXIT_CODE=$code" >> failures.log
          exit 0
      - name: Comment failures
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '## Step 6 remaining full-suite failures'
            echo
            echo '```text'
            cat failures.log
            echo '```'
          } > comment.md
          gh pr comment 29 --repo 17020749/orderKingcup --body-file comment.md
