name: Phase 4 Admin Aggregate Diagnostic

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - .phase4-transfer/trigger

permissions:
  contents: write

jobs:
  diagnostic:
    name: Test admin aggregate Rules fast-path
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/phase-4-completion
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm install --global npm@10.9.2 --no-audit --no-fund
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Reconstruct source and apply fast-path
        shell: bash
        run: |
          cat .phase4-transfer/chunk-00 .phase4-transfer/rest-00 .phase4-transfer/rest-01-* .phase4-transfer/rest-02 .phase4-transfer/rest-03-00 .phase4-transfer/rest-03-01 .phase4-transfer/rest-03-02-* > /tmp/phase4.b64
          base64 --decode /tmp/phase4.b64 > /tmp/phase4.tar.gz
          echo '53add98bcf8090ea181e57838dacf5d0096e2ec27dfeaad6c4abdbf2330e11cd  /tmp/phase4.tar.gz' | sha256sum --check --strict
          tar -xzf /tmp/phase4.tar.gz -C .
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          path = Path('composables/useScopedQueries.ts')
          source = path.read_text(encoding='utf-8')
          start = source.find("    const active = [where('active', '==', true), where('deleted', '==', false)]")
          marker = "        exportRequests: requestCount.data().count,\n      },"
          end = source.find(marker, start)
          if start < 0 or end < 0: raise SystemExit('aggregate block not found')
          end += len(marker)
          replacement = dedent("""\
              const active = [where('active', '==', true), where('deleted', '==', false)]
              const activeOrders = query(collection(db, 'orders'), ...active)
              const [orderCount, orderRevenue, orderDebt, customerCount, productCount, paymentAggregate, itemAggregate, requestCount, orderPage, paymentPage] = await Promise.all([
                getCountFromServer(activeOrders),
                getAggregateFromServer(activeOrders, { revenue: sum('actual_revenue') }),
                getAggregateFromServer(activeOrders, { debt: sum('debt_amount') }),
                getCountFromServer(query(collection(db, 'customers'), ...active)),
                getCountFromServer(query(collection(db, 'products'), ...active)),
                getAggregateFromServer(query(collection(db, 'payments'), ...active, where('payment_status', '==', 'Đã nhận')), { paid: sum('amount') }),
                getAggregateFromServer(query(collection(db, 'order_items'), ...active), { profit: sum('line_profit') }),
                getCountFromServer(query(collection(db, 'order_export_requests'), ...active)),
                fetchOrderedPage<OrderDoc>('orders', 'created_at', null, 50),
                fetchOrderedPage<PaymentDoc>('payments', 'payment_date', null, 50),
              ])

              return {
                stats: {
                  orders: orderCount.data().count,
                  customers: customerCount.data().count,
                  products: productCount.data().count,
                  revenue: Number(orderRevenue.data().revenue || 0),
                  paid: Number(paymentAggregate.data().paid || 0),
                  debt: Number(orderDebt.data().debt || 0),
                  profit: Number(itemAggregate.data().profit || 0),
                  exportRequests: requestCount.data().count,
                },
          """)
          path.write_text(source[:start] + replacement + source[end:], encoding='utf-8')

          path = Path('tests/dashboard-aggregation.rules.test.mjs')
          source = path.read_text(encoding='utf-8')
          start = source.find("  const orders = await assertSucceeds(getAggregateFromServer(query(collection(db, 'orders'), ...active), {")
          marker = "  assert.equal(orders.data().debt, 800)"
          end = source.find(marker, start)
          if start < 0 or end < 0: raise SystemExit('test block not found')
          end += len(marker)
          replacement = dedent("""\
            const activeOrders = query(collection(db, 'orders'), ...active)
            const orderCount = await assertSucceeds(getCountFromServer(activeOrders))
            const orderRevenue = await assertSucceeds(getAggregateFromServer(activeOrders, { revenue: sum('actual_revenue') }))
            const orderDebt = await assertSucceeds(getAggregateFromServer(activeOrders, { debt: sum('debt_amount') }))
            assert.equal(orderCount.data().count, 2)
            assert.equal(orderRevenue.data().revenue, 3000)
            assert.equal(orderDebt.data().debt, 800)
          """)
          path.write_text(source[:start] + replacement + source[end:], encoding='utf-8')

          rules_path = Path('firestore.rules')
          rules = rules_path.read_text(encoding='utf-8')
          old = """    match /orders/{docId} {
              allow read: if hasPerm('orders.view_all')
          """.replace('\n              ', '\n      ')
          new = """    match /orders/{docId} {
              // Admin aggregation queries need a short authorization path to stay
              // below the Firestore Rules 1,000-expression evaluation budget.
              allow read: if isAdmin()
                || hasPerm('orders.view_all')
          """.replace('\n              ', '\n      ').replace('\n                ', '\n        ')
          if old not in rules: raise SystemExit('orders read rule not found')
          rules_path.write_text(rules.replace(old, new, 1), encoding='utf-8')
          PY

      - run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run Dashboard aggregate test
        id: dashboard
        shell: bash
        run: |
          set +e
          npx firebase emulators:exec --only firestore "node --test --test-concurrency=1 tests/dashboard-aggregation.rules.test.mjs" 2>&1 | tee .phase4-transfer/admin-fast-path.log
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit diagnostic log
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f .phase4-transfer/admin-fast-path.log
          git commit -m 'test(phase4): capture admin aggregate fast-path result'
          git push origin HEAD:fix/phase-4-completion

      - name: Report failure
        if: steps.dashboard.outputs.exit_code != '0'
        run: exit 1
