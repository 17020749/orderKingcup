name: Phase 5 Staging Diagnostic

on:
  push:
    branches:
      - security/phase-5-activity-notifications
    paths:
      - .github/workflows/phase5-staging-diagnostic.yml

  pull_request:
    branches:
      - dev
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - .github/workflows/phase5-staging-diagnostic.yml

permissions:
  contents: read

env:
  EXPECTED_FIREBASE_PROJECT_ID: kingcupmanagerstaging

concurrency:
  group: phase5-staging-diagnostic-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  diagnose-staging-rules:
    if: github.event_name == 'push' || github.event.pull_request.head.ref == 'security/phase-5-activity-notifications'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: dev
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: security/phase-5-activity-notifications

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Pin npm
        run: npm install --global npm@10.9.2 --no-audit --no-fund

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Validate staging service account
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          node <<'NODE'
          const account = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT || '{}')
          if (account.project_id !== process.env.EXPECTED_FIREBASE_PROJECT_ID) {
            console.error(`Expected ${process.env.EXPECTED_FIREBASE_PROJECT_ID}, got ${account.project_id || 'unknown'}`)
            process.exit(1)
          }
          NODE

      - name: Authenticate staging service account
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Diagnose Firestore Rules deployment
        id: deploy
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npx --no-install firebase deploy \
            --only firestore:rules \
            --project "$EXPECTED_FIREBASE_PROJECT_ID" \
            --non-interactive \
            --debug 2>&1 | tee phase5-staging-deploy.log

      - name: Upload diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase5-staging-deploy-log
          path: phase5-staging-deploy.log
          if-no-files-found: error
          retention-days: 1

      - name: Preserve deployment outcome
        if: steps.deploy.outcome == 'failure'
        run: exit 1
