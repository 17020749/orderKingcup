name: Diagnose Step 5 Tests

on:
  push:
    branches:
      - agent/step-5-atomic-order-save
    paths:
      - .github/workflows/diagnose-step5.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/step-5-atomic-order-save
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run isolated Step 5 tests
        shell: bash
        run: |
          set +e
          pnpm exec firebase emulators:exec --only firestore "node --test --test-concurrency=1 tests/order-atomic-save.client.test.mjs tests/order-atomic-save.rules.test.mjs" > step5-diagnostic.log 2>&1
          echo "EXIT_CODE=$?" >> step5-diagnostic.log
          exit 0

      - name: Commit diagnostic and remove one-time workflow
        run: |
          rm .github/workflows/diagnose-step5.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add step5-diagnostic.log .github/workflows/diagnose-step5.yml
          git commit -m "chore(orders): capture atomic test failure"
          git push origin HEAD:agent/step-5-atomic-order-save
