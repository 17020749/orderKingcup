name: Phase 5 Security Apply v2

on:
  pull_request:
    branches: [dev]
    types: [opened, synchronize, reopened]
    paths: [.phase5-trigger-v2]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NUXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
      NUXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.invalid
      NUXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
      NUXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder
      NUXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
      NUXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000000000'
      NUXT_PUBLIC_APP_NAME: KINGCUP CI
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/phase-5-audit-notifications
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm install --global npm@10.9.2 --no-audit --no-fund
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Patch Rules and add security tests
        shell: bash
        run: |
          python - <<'PY'
          import json, re
          from pathlib import Path

          p = Path('firestore.rules')
          s = p.read_text(encoding='utf-8')

          helper = r'''    function notificationTargetUserIsActive(targetEmail) {
            let path = /databases/$(database)/documents/users/$(targetEmail.lower());
            return targetEmail is string
              && targetEmail != ''
              && exists(path)
              && activeUserData(get(path).data);
          }

          function notificationDirectTargetIsValid(data) {
            let directEmail = data.get('to_email', '');
            return notificationTargetUserIsActive(directEmail)
              && data.get('audience', '') == ''
              && data.get('audience_permissions', []) == [];
          }

          function notificationWarehouseTargetIsValid(data) {
            let requiredPermissions = [
              'export_requests.accept',
              'export_requests.reject',
              'export_requests.release',
              'export_requests.process'
            ];
            let audiencePermissions = data.get('audience_permissions', []);
            return data.get('to_email', '') == ''
              && data.get('audience', '') == 'warehouse_export'
              && audiencePermissions is list
              && audiencePermissions.hasAll(requiredPermissions)
              && audiencePermissions.hasOnly(requiredPermissions)
              && hasPerm('orders.warehouse_export');
          }

          function notificationCreateTargetIsValid() {
            return notificationDirectTargetIsValid(request.resource.data)
              || notificationWarehouseTargetIsValid(request.resource.data);
          }

          function notificationInitialStateIsValid(data) {
            return data.get('read', false) == false
              && data.get('is_read', false) == false
              && data.get('seen', false) == false
              && ['', 'unread'].hasAny([data.get('status', '')])
              && data.get('deleted', false) != true;
          }

'''
          pattern = r"    function notificationCreateTargetIsValid\(\) \{.*?^    \}\n\n(?=    // ---------------------------------------------------------------------\n    // Generic data helpers)"
          s, n = re.subn(pattern, helper, s, count=1, flags=re.S | re.M)
          if n != 1: raise SystemExit(f'notification helper replacement count={n}')

          logs = r'''    match /activity_logs/{docId} {
            allow read: if hasPerm('activity_logs.view');
            allow create: if activeUser()
              && ownEmailField(request.resource.data, 'changed_by')
              && request.resource.data.get('module', '') is string
              && request.resource.data.get('module', '') != ''
              && request.resource.data.get('action', '') is string
              && request.resource.data.get('action', '') != '';
            allow update, delete: if false;
          }

'''
          pattern = r"    match /activity_logs/\{docId\} \{.*?^    \}\n\n(?=    match /notifications/)"
          s, n = re.subn(pattern, logs, s, count=1, flags=re.S | re.M)
          if n != 1: raise SystemExit(f'activity_logs replacement count={n}')

          notifications = r'''    match /notifications/{docId} {
            allow read: if isAdmin()
              || (activeUser() && (
                ownEmailField(resource.data, 'to_email')
                || notificationAudienceMatches(resource.data)
              ));

            allow create: if activeUser()
              && ownEmailField(request.resource.data, 'created_by')
              && notificationCreateTargetIsValid()
              && notificationInitialStateIsValid(request.resource.data);

            allow update: if (
                isAdmin()
                || (activeUser() && ownEmailField(resource.data, 'to_email'))
              )
              && unchanged([
                'to_email', 'audience', 'audience_permissions',
                'created_by', 'created_at', 'title', 'message',
                'module', 'action', 'item_code', 'entity_id', 'payload'
              ])
              && onlyChanged([
                'read', 'is_read', 'read_at', 'seen', 'seen_at',
                'status', 'updated_at'
              ]);

            allow delete: if isAdmin();
          }

'''
          pattern = r"    match /notifications/\{docId\} \{.*?^    \}\n\n(?=    match /notification_reads/)"
          s, n = re.subn(pattern, notifications, s, count=1, flags=re.S | re.M)
          if n != 1: raise SystemExit(f'notifications replacement count={n}')
          p.write_text(s, encoding='utf-8')

          test = r'''import { readFileSync } from 'node:fs'
          import { after, before, beforeEach, test } from 'node:test'
          import { assertFails, assertSucceeds, initializeTestEnvironment } from '@firebase/rules-unit-testing'
          import { deleteDoc, doc, setDoc, updateDoc } from 'firebase/firestore'

          const CREATOR = 'creator@example.com'
          const RECIPIENT = 'recipient@example.com'
          const ADMIN = 'admin@example.com'
          const INACTIVE = 'inactive@example.com'
          let env

          async function seed() {
            await env.withSecurityRulesDisabled(async ctx => {
              const db = ctx.firestore()
              await Promise.all([
                setDoc(doc(db, 'users', CREATOR), { email: CREATOR, active: true, deleted: false, permissions_flat: ['orders.warehouse_export'] }),
                setDoc(doc(db, 'users', RECIPIENT), { email: RECIPIENT, active: true, deleted: false, permissions_flat: [] }),
                setDoc(doc(db, 'users', ADMIN), { email: ADMIN, active: true, deleted: false, permissions_flat: ['*'] }),
                setDoc(doc(db, 'users', INACTIVE), { email: INACTIVE, active: false, deleted: false, permissions_flat: [] }),
                setDoc(doc(db, 'activity_logs', 'existing'), { module: 'orders', action: 'create', changed_by: CREATOR, created_at: 'now' }),
                setDoc(doc(db, 'notifications', 'direct'), {
                  to_email: RECIPIENT, audience: '', audience_permissions: [], created_by: CREATOR,
                  title: 'Title', message: 'Original', status: 'unread', read: false,
                  active: true, deleted: false, created_at: 'now'
                }),
                setDoc(doc(db, 'notifications', 'broadcast'), {
                  to_email: '', audience: 'warehouse_export',
                  audience_permissions: ['export_requests.accept','export_requests.reject','export_requests.release','export_requests.process'],
                  created_by: CREATOR, title: 'Warehouse', message: 'Request', status: 'unread', read: false,
                  active: true, deleted: false, created_at: 'now'
                })
              ])
            })
          }

          before(async () => {
            env = await initializeTestEnvironment({ projectId: 'demo-phase5-security', firestore: { rules: readFileSync('firestore.rules', 'utf8') } })
          })
          beforeEach(async () => { await env.clearFirestore(); await seed() })
          after(async () => { await env.cleanup() })

          test('activity log binds active actor and is append-only', async () => {
            const creator = env.authenticatedContext(CREATOR, { email: CREATOR }).firestore()
            const inactive = env.authenticatedContext(INACTIVE, { email: INACTIVE }).firestore()
            const admin = env.authenticatedContext(ADMIN, { email: ADMIN }).firestore()
            await assertSucceeds(setDoc(doc(creator, 'activity_logs', 'ok'), { module: 'orders', action: 'update', changed_by: CREATOR }))
            await assertFails(setDoc(doc(creator, 'activity_logs', 'forged'), { module: 'orders', action: 'update', changed_by: RECIPIENT }))
            await assertFails(setDoc(doc(inactive, 'activity_logs', 'inactive'), { module: 'orders', action: 'update', changed_by: INACTIVE }))
            await assertFails(updateDoc(doc(admin, 'activity_logs', 'existing'), { action: 'tampered' }))
            await assertFails(deleteDoc(doc(admin, 'activity_logs', 'existing')))
          })

          test('direct notification requires one active recipient and unread initial state', async () => {
            const db = env.authenticatedContext(CREATOR, { email: CREATOR }).firestore()
            const base = { audience: '', audience_permissions: [], created_by: CREATOR, title: 'T', message: 'M', status: 'unread', read: false, deleted: false }
            await assertSucceeds(setDoc(doc(db, 'notifications', 'ok'), { ...base, to_email: RECIPIENT }))
            await assertFails(setDoc(doc(db, 'notifications', 'missing'), { ...base, to_email: 'missing@example.com' }))
            await assertFails(setDoc(doc(db, 'notifications', 'inactive'), { ...base, to_email: INACTIVE }))
            await assertFails(setDoc(doc(db, 'notifications', 'mixed'), { ...base, to_email: RECIPIENT, audience: 'warehouse_export' }))
            await assertFails(setDoc(doc(db, 'notifications', 'read'), { ...base, to_email: RECIPIENT, status: 'read', read: true }))
          })

          test('warehouse broadcast requires exact supported permission list', async () => {
            const db = env.authenticatedContext(CREATOR, { email: CREATOR }).firestore()
            const permissions = ['export_requests.accept','export_requests.reject','export_requests.release','export_requests.process']
            const base = { to_email: '', audience: 'warehouse_export', created_by: CREATOR, title: 'T', message: 'M', status: 'unread', read: false, deleted: false }
            await assertSucceeds(setDoc(doc(db, 'notifications', 'broadcast-ok'), { ...base, audience_permissions: permissions }))
            await assertFails(setDoc(doc(db, 'notifications', 'broadcast-missing'), { ...base, audience_permissions: permissions.slice(0, 3) }))
            await assertFails(setDoc(doc(db, 'notifications', 'broadcast-extra'), { ...base, audience_permissions: [...permissions, '*'] }))
          })

          test('recipient and admin cannot rewrite notification content', async () => {
            const recipient = env.authenticatedContext(RECIPIENT, { email: RECIPIENT }).firestore()
            const admin = env.authenticatedContext(ADMIN, { email: ADMIN }).firestore()
            const creator = env.authenticatedContext(CREATOR, { email: CREATOR }).firestore()
            await assertSucceeds(updateDoc(doc(recipient, 'notifications', 'direct'), { status: 'read', read: true, read_at: 'now', updated_at: 'now' }))
            await assertFails(updateDoc(doc(recipient, 'notifications', 'direct'), { message: 'changed', updated_at: 'now' }))
            await assertFails(updateDoc(doc(admin, 'notifications', 'direct'), { to_email: ADMIN, message: 'admin changed' }))
            await assertFails(updateDoc(doc(creator, 'notifications', 'broadcast'), { status: 'read', read: true, updated_at: 'now' }))
          })
          '''.replace('\n          ', '\n')
          Path('tests/security-logs-notifications.rules.test.mjs').write_text(test, encoding='utf-8')

          package = Path('package.json')
          data = json.loads(package.read_text(encoding='utf-8'))
          token = ' tests/security-logs-notifications.rules.test.mjs'
          if token not in data['scripts']['test:rules']:
            data['scripts']['test:rules'] = data['scripts']['test:rules'].replace(' tests/firestore.rules.test.mjs', ' tests/firestore.rules.test.mjs' + token, 1)
          package.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          git diff --check

      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npx --no-install nuxi prepare
      - run: npm run build
      - run: npm run generate
      - run: npm run test:rules

      - name: Commit source
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add firestore.rules package.json tests/security-logs-notifications.rules.test.mjs
          git diff --cached --check
          git commit -m 'security(firestore): harden audit logs and notifications'
          git push origin HEAD:security/phase-5-audit-notifications
