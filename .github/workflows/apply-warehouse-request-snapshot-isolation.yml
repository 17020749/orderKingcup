name: Apply warehouse request snapshot isolation

on:
  push:
    branches:
      - agent/warehouse-request-snapshot-isolation
    paths:
      - .github/workflows/apply-warehouse-request-snapshot-isolation.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/warehouse-request-snapshot-isolation
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
      - name: Decode and apply guarded patches
        shell: bash
        run: |
          cat > /tmp/patch.b64 <<'PATCH'

PATCH
          base64 -d /tmp/patch.b64 | gunzip > /tmp/apply-patch.mjs
          node /tmp/apply-patch.mjs
      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Prepare and build
        run: |
          npx --no-install nuxi prepare
          npm run build
      - name: Run focused isolation tests
        run: node --test tests/warehouse-print-menu.static.test.mjs tests/bus-transport-followup.static.test.mjs
      - name: Commit source changes and remove temporary workflow
        shell: bash
        run: |
          rm -f .github/workflows/apply-warehouse-request-snapshot-isolation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Isolate warehouse requests from order reads"
          git push origin HEAD:agent/warehouse-request-snapshot-isolation
