name: Phase 4 Completion

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - .phase4-transfer/trigger

permissions:
  contents: write

concurrency:
  group: phase4-completion-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  complete:
    name: Verify and commit Phase 4 completion
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      NUXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
      NUXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.invalid
      NUXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
      NUXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder
      NUXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
      NUXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000000000'
      NUXT_PUBLIC_APP_NAME: KINGCUP CI

    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: fix/phase-4-completion
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Pin npm
        run: npm install --global npm@10.9.2 --no-audit --no-fund

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Reconstruct verified Phase 4 source
        shell: bash
        run: |
          cat \
            .phase4-transfer/chunk-00 \
            .phase4-transfer/rest-00 \
            .phase4-transfer/rest-01-* \
            .phase4-transfer/rest-02 \
            .phase4-transfer/rest-03-00 \
            .phase4-transfer/rest-03-01 \
            .phase4-transfer/rest-03-02-* \
            > /tmp/phase4-files.tar.gz.b64
          base64 --decode /tmp/phase4-files.tar.gz.b64 > /tmp/phase4-files.tar.gz
          echo '53add98bcf8090ea181e57838dacf5d0096e2ec27dfeaad6c4abdbf2330e11cd  /tmp/phase4-files.tar.gz' | sha256sum --check --strict
          tar -xzf /tmp/phase4-files.tar.gz -C .
          git diff --check

      - name: Split dashboard aggregates below Rules expression budget
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          scoped_path = Path('composables/useScopedQueries.ts')
          scoped = scoped_path.read_text(encoding='utf-8')
          old_scoped = """    const active = [where('active', '==', true), where('deleted', '==', false)]
              const [ordersAggregate, customerCount, productCount, paymentAggregate, itemAggregate, requestCount, orderPage, paymentPage] = await Promise.all([
                getAggregateFromServer(query(collection(db, 'orders'), ...active), {
                  total: count(),
                  revenue: sum('actual_revenue'),
                  debt: sum('debt_amount'),
                }),
                getCountFromServer(query(collection(db, 'customers'), ...active)),
                getCountFromServer(query(collection(db, 'products'), ...active)),
                getAggregateFromServer(query(
                  collection(db, 'payments'),
                  ...active,
                  where('payment_status', '==', 'Đã nhận'),
                ), { paid: sum('amount') }),
                getAggregateFromServer(query(collection(db, 'order_items'), ...active), {
                  profit: sum('line_profit'),
                }),
                getCountFromServer(query(collection(db, 'order_export_requests'), ...active)),
                fetchOrderedPage<OrderDoc>('orders', 'created_at', null, 50),
                fetchOrderedPage<PaymentDoc>('payments', 'payment_date', null, 50),
              ])

              const orderData = ordersAggregate.data()
              return {
                stats: {
                  orders: Number(orderData.total || 0),
                  customers: customerCount.data().count,
                  products: productCount.data().count,
                  revenue: Number(orderData.revenue || 0),
                  paid: Number(paymentAggregate.data().paid || 0),
                  debt: Number(orderData.debt || 0),
                  profit: Number(itemAggregate.data().profit || 0),
                  exportRequests: requestCount.data().count,
                },
          """
          new_scoped = """    const active = [where('active', '==', true), where('deleted', '==', false)]
              const activeOrders = query(collection(db, 'orders'), ...active)
              const [orderCount, orderRevenue, orderDebt, customerCount, productCount, paymentAggregate, itemAggregate, requestCount, orderPage, paymentPage] = await Promise.all([
                // Keep each aggregate request small. Combining count + multiple sums in one
                // request can exceed the Firestore Rules 1,000-expression budget.
                getCountFromServer(activeOrders),
                getAggregateFromServer(activeOrders, { revenue: sum('actual_revenue') }),
                getAggregateFromServer(activeOrders, { debt: sum('debt_amount') }),
                getCountFromServer(query(collection(db, 'customers'), ...active)),
                getCountFromServer(query(collection(db, 'products'), ...active)),
                getAggregateFromServer(query(
                  collection(db, 'payments'),
                  ...active,
                  where('payment_status', '==', 'Đã nhận'),
                ), { paid: sum('amount') }),
                getAggregateFromServer(query(collection(db, 'order_items'), ...active), {
                  profit: sum('line_profit'),
                }),
                getCountFromServer(query(collection(db, 'order_export_requests'), ...active)),
                fetchOrderedPage<OrderDoc>('orders', 'created_at', null, 50),
                fetchOrderedPage<PaymentDoc>('payments', 'payment_date', null, 50),
              ])

              return {
                stats: {
                  orders: orderCount.data().count,
                  customers: customerCount.data().count,
                  products: productCount.data().count,
                  revenue: Number(orderRevenue.data().revenue || 0),
                  paid: Number(paymentAggregate.data().paid || 0),
                  debt: Number(orderDebt.data().debt || 0),
                  profit: Number(itemAggregate.data().profit || 0),
                  exportRequests: requestCount.data().count,
                },
          """
          if old_scoped not in scoped:
              raise SystemExit('Expected dashboard aggregate block was not found in useScopedQueries.ts')
          scoped_path.write_text(scoped.replace(old_scoped, new_scoped, 1), encoding='utf-8')

          test_path = Path('tests/dashboard-aggregation.rules.test.mjs')
          test_source = test_path.read_text(encoding='utf-8')
          old_test = """  const orders = await assertSucceeds(getAggregateFromServer(query(collection(db, 'orders'), ...active), {
              total: count(),
              revenue: sum('actual_revenue'),
              debt: sum('debt_amount'),
            }))
            assert.equal(orders.data().total, 2)
            assert.equal(orders.data().revenue, 3000)
            assert.equal(orders.data().debt, 800)
          """
          new_test = """  const activeOrders = query(collection(db, 'orders'), ...active)
            const orderCount = await assertSucceeds(getCountFromServer(activeOrders))
            const orderRevenue = await assertSucceeds(getAggregateFromServer(activeOrders, {
              revenue: sum('actual_revenue'),
            }))
            const orderDebt = await assertSucceeds(getAggregateFromServer(activeOrders, {
              debt: sum('debt_amount'),
            }))
            assert.equal(orderCount.data().count, 2)
            assert.equal(orderRevenue.data().revenue, 3000)
            assert.equal(orderDebt.data().debt, 800)
          """
          if old_test not in test_source:
              raise SystemExit('Expected combined aggregate test block was not found')
          test_path.write_text(test_source.replace(old_test, new_test, 1), encoding='utf-8')
          PY
          git diff --check

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Prepare Nuxt
        run: npx --no-install nuxi prepare

      - name: Test cursor pagination
        run: npm run test:pagination

      - name: Validate Firestore indexes
        run: npm run test:indexes

      - name: Build
        run: npm run build

      - name: Generate static site
        run: npm run generate

      - name: Firestore Rules and concurrency tests
        run: npm run test:rules

      - name: Commit verified Phase 4 completion
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          rm -rf .phase4-transfer
          rm -f .github/workflows/phase4-apply.yml
          git add -A
          git diff --cached --check

          unexpected=0
          while IFS= read -r path; do
            case "$path" in
              components/CursorLoadMore.vue|composables/useScopedQueries.ts|docs/cursor-pagination-dashboard.md|package.json|pages/dashboard.vue|pages/orders.vue|pages/payments.vue|pages/invoices.vue|pages/shipments.vue|pages/imports.vue|pages/exports.vue|pages/inventory-adjustments.vue|tests/cursor-pagination.test.mjs|tests/dashboard-aggregation.rules.test.mjs|utils/cursorPagination.mjs|.github/workflows/phase4-apply.yml|.phase4-transfer/*)
                ;;
              *)
                echo "Unexpected Phase 4 path: $path"
                unexpected=1
                ;;
            esac
          done < <(git diff --cached --name-only)
          test "$unexpected" -eq 0
          test -z "$(git diff --cached --name-only -- firestore.rules firestore.indexes.json package-lock.json)"

          git commit -m 'perf(firestore): complete cursor pagination and dashboard aggregates'
          git push origin HEAD:fix/phase-4-completion
