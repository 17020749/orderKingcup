name: Apply Order Relation Permission Hotfix

on:
  push:
    branches:
      - fix/order-relation-permissions
    paths:
      - scripts/apply-order-relation-permission-hotfix.mjs
      - .github/workflows/apply-order-relation-permission-hotfix.yml

permissions:
  contents: write

concurrency:
  group: apply-order-relation-permission-hotfix
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v4
        with:
          ref: fix/order-relation-permissions
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Pin npm
        run: npm install --global npm@10.9.2 --no-audit --no-fund

      - name: Apply guarded source patch
        run: node scripts/apply-order-relation-permission-hotfix.mjs

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Prepare Nuxt
        run: npx --no-install nuxi prepare

      - name: Run relation and client regressions
        run: |
          npx --no-install firebase emulators:exec --only firestore "node --test --test-concurrency=1 tests/order-relations.rules.test.mjs"
          node --test tests/order-printing-delete-lock.client.test.mjs

      - name: Build application
        env:
          NUXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
          NUXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.invalid
          NUXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
          NUXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder
          NUXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          NUXT_PUBLIC_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000000000'
          NUXT_PUBLIC_APP_NAME: KINGCUP CI
        run: npm run build

      - name: Commit verified hotfix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add firestore.rules pages/orders.vue tests/order-relations.rules.test.mjs tests/order-printing-delete-lock.client.test.mjs scripts/apply-order-relation-permission-hotfix.mjs .github/workflows/apply-order-relation-permission-hotfix.yml
          git diff --cached --check
          git commit -m "fix(auth): align order relation permissions and new-order state"
          git push origin HEAD:fix/order-relation-permissions
