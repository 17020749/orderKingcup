name: Diagnose Step 8 Export Lifecycle

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/step-8-export-lifecycle'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/step-8-export-lifecycle
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
      - uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Run isolated lifecycle tests
        id: tests
        continue-on-error: true
        run: |
          pnpm exec firebase emulators:exec --only firestore "node --test --test-concurrency=1 tests/export-lifecycle.client.test.mjs tests/export-lifecycle.rules.test.mjs" > step8-full.log 2>&1
      - name: Persist concise result
        run: |
          {
            grep -n -B 3 -A 22 "not ok" step8-full.log || true
            echo "--- SUMMARY ---"
            tail -n 35 step8-full.log
          } > step8-diagnose.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add step8-diagnose.txt
          git commit -m "chore(step8): record isolated lifecycle results" || true
          git push origin HEAD:agent/step-8-export-lifecycle
