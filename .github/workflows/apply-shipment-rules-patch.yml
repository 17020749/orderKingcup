name: Apply shipment rules patch

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  patch-rules:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/fix-order-payment-export-permissions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          show-progress: false

      - name: Replace shipment read scope
        shell: python
        run: |
          from pathlib import Path

          path = Path('firestore.rules')
          source = path.read_text(encoding='utf-8')
          start_marker = '    match /shipments/{docId} {'
          create_marker = "      allow create: if hasPerm('shipments.create')"
          start = source.index(start_marker)
          create = source.index(create_marker, start)
          new_read_block = '\n'.join([
            "    match /shipments/{docId} {",
            "      allow read: if hasPerm('shipments.view_all')",
            "        || (",
            "          hasAnyPerm([",
            "            'shipments.view',",
            "            'shipments.create',",
            "            'shipments.edit',",
            "            'shipments.delete'",
            "          ])",
            "          && (",
            "            hasPerm('orders.view_all')",
            "            || ownsOrderChildData(resource.data)",
            "            || (",
            "              resource.data.order_id is string",
            "              && ownsOrderById(resource.data.order_id)",
            "            )",
            "          )",
            "        );",
            "",
          ])
          path.write_text(source[:start] + new_read_block + source[create:], encoding='utf-8')

      - name: Update rules through Contents API
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          current_sha="$(gh api "repos/${GITHUB_REPOSITORY}/contents/firestore.rules?ref=${TARGET_BRANCH}" --jq .sha)"
          export CURRENT_SHA="$current_sha"
          node <<'NODE' > /tmp/update-rules.json
          const fs = require('node:fs')
          process.stdout.write(JSON.stringify({
            message: 'align shipment firestore permissions',
            content: fs.readFileSync('firestore.rules').toString('base64'),
            sha: process.env.CURRENT_SHA,
            branch: process.env.TARGET_BRANCH,
          }))
          NODE
          gh api \
            --method PUT \
            "repos/${GITHUB_REPOSITORY}/contents/firestore.rules" \
            --input /tmp/update-rules.json
