name: Diagnose Runtime Full Suite

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'fix/runtime-export-and-sync-locks'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/runtime-export-and-sync-locks
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
      - uses: pnpm/action-setup@v4
        with:
          version: '9.15.9'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Run full suite
        id: tests
        continue-on-error: true
        run: pnpm run test:rules > runtime-full-suite.log 2>&1
      - name: Persist concise result
        run: |
          {
            grep -n -B 4 -A 26 "not ok" runtime-full-suite.log || true
            echo "--- SUMMARY ---"
            tail -n 45 runtime-full-suite.log
          } > runtime-full-suite-diagnose.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime-full-suite-diagnose.txt
          git commit -m "chore(fix): record full suite regressions" || true
          git push origin HEAD:fix/runtime-export-and-sync-locks
