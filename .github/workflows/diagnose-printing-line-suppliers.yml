name: Diagnose printing line suppliers

on:
  push:
    branches:
      - agent/printing-line-suppliers
    paths:
      - .github/workflows/diagnose-printing-line-suppliers.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/printing-line-suppliers
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm install --global npm@10.9.2 --no-audit --no-fund
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Run tests and capture concise failure
        shell: bash
        run: |
          set +e
          npm run test:rules > /tmp/rules.log 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            rm -f .github/workflows/diagnose-printing-line-suppliers.yml
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/workflows/diagnose-printing-line-suppliers.yml
            git commit -m "Remove printing line supplier diagnostic"
            git push origin HEAD:agent/printing-line-suppliers
            exit 0
          fi
          {
            echo '=== MATCHED FAILURE LINES ==='
            grep -n -B 12 -A 35 -E 'not ok|AssertionError|Syntax error|ERROR|Error:|Failed to load|Unexpected' /tmp/rules.log || true
            echo '=== LOG TAIL ==='
            tail -n 220 /tmp/rules.log
          } > PRINTING_LINE_SUPPLIER_ERROR.txt
          rm -f .github/workflows/diagnose-printing-line-suppliers.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PRINTING_LINE_SUPPLIER_ERROR.txt .github/workflows/diagnose-printing-line-suppliers.yml
          git commit -m "Record printing line supplier test failure"
          git push origin HEAD:agent/printing-line-suppliers
          exit "$status"
