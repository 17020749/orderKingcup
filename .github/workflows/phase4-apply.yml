name: Phase 4 Diagnostic

on:
  pull_request:
    branches:
      - dev
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - .phase4-transfer/trigger

permissions:
  contents: write

concurrency:
  group: phase4-diagnostic-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  diagnostic:
    name: Diagnose Phase 4 Rules suite
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout correction branch
        uses: actions/checkout@v4
        with:
          ref: fix/phase-4-completion
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Pin npm
        run: npm install --global npm@10.9.2 --no-audit --no-fund

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Reconstruct verified Phase 4 source
        shell: bash
        run: |
          cat \
            .phase4-transfer/chunk-00 \
            .phase4-transfer/rest-00 \
            .phase4-transfer/rest-01-* \
            .phase4-transfer/rest-02 \
            .phase4-transfer/rest-03-00 \
            .phase4-transfer/rest-03-01 \
            .phase4-transfer/rest-03-02-* \
            > /tmp/phase4-files.tar.gz.b64
          base64 --decode /tmp/phase4-files.tar.gz.b64 > /tmp/phase4-files.tar.gz
          echo '53add98bcf8090ea181e57838dacf5d0096e2ec27dfeaad6c4abdbf2330e11cd  /tmp/phase4-files.tar.gz' | sha256sum --check --strict
          tar -xzf /tmp/phase4-files.tar.gz -C .

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run full Rules suite diagnostic
        id: rules
        shell: bash
        run: |
          set +e
          npm run test:rules 2>&1 | tee .phase4-transfer/full-rules-diagnostic.log
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit diagnostic log
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f .phase4-transfer/full-rules-diagnostic.log
          git commit -m 'test(phase4): capture full Rules suite failure'
          git push origin HEAD:fix/phase-4-completion

      - name: Fail when Rules suite failed
        if: steps.rules.outputs.exit_code != '0'
        run: exit 1
